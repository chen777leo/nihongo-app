<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日本語会話 AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --ink2: #2d2d4e;
  --paper: #f7f4ef;
  --paper2: #edeae3;
  --teal: #1a7a6e;
  --teal-light: #e0f5f3;
  --muted: #7a7a8c;
  --border: rgba(26,26,46,0.1);
  --radius: 12px;
  --radius-lg: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
}

/* ─── LAYOUT ─── */
.wrap { max-width: 800px; margin: 0 auto; padding: 0 16px 100px; }

/* ─── HEADER ─── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 0 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 22px;
  position: sticky; top: 0; background: var(--paper); z-index: 100;
}
.logo { display: flex; align-items: baseline; gap: 8px; }
.logo-jp { font-size: 20px; font-weight: 700; color: var(--ink); }
.logo-tag {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--muted); letter-spacing: 0.12em;
}
.geo-btn {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted);
  background: var(--paper2); border-radius: 20px;
  padding: 6px 14px; border: 1px solid var(--border);
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.geo-btn:hover { border-color: var(--teal); color: var(--teal); }
.geo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; flex-shrink: 0; }
.geo-dot.on { background: var(--teal); box-shadow: 0 0 0 3px rgba(26,122,110,0.15); }

/* ─── LOCATION CARD ─── */
.loc-card {
  background: var(--teal-light); border: 1px solid rgba(26,122,110,0.2);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 18px;
  display: none; align-items: center; gap: 12px; animation: fadeIn 0.3s;
}
.loc-card.show { display: flex; }
.loc-name { font-size: 14px; font-weight: 500; color: var(--teal); }
.loc-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }
.loc-use { font-size: 12px; padding: 6px 16px; background: var(--teal); color: #fff; border: none; border-radius: 20px; cursor: pointer; font-family: inherit; white-space: nowrap; }

/* ─── KEYWORD ROW ─── */
.kw-row { display: flex; gap: 8px; margin-bottom: 20px; }
.kw-row input {
  flex: 1; height: 42px; border-radius: var(--radius); padding: 0 14px;
  border: 1px solid var(--border); background: #fff; font-size: 13px;
  font-family: inherit; color: var(--ink); transition: border-color 0.2s;
}
.kw-row input:focus { outline: none; border-color: var(--teal); }
.kw-row input::placeholder { color: var(--muted); }
.gen-btn {
  height: 42px; padding: 0 18px; background: var(--ink); color: var(--paper);
  border: none; border-radius: var(--radius); font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer; white-space: nowrap; transition: background 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.gen-btn:hover { background: var(--ink2); }
.gen-btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ─── CATEGORY TABS ─── */
.sec-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em; color: var(--muted);
  text-transform: uppercase; margin-bottom: 10px;
}
.cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.cat-tab {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: #fff; color: var(--ink);
  cursor: pointer; transition: all 0.15s; font-family: inherit; font-weight: 500;
}
.cat-tab:hover { border-color: var(--ink); }
.cat-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.cat-tab .cat-icon { font-size: 14px; }

/* ─── SCENE GRID ─── */
.scene-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
  gap: 8px; margin-bottom: 22px; min-height: 60px;
}
.scene-card {
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 13px; cursor: pointer; transition: all 0.15s;
  display: flex; flex-direction: column; gap: 4px;
}
.scene-card:hover { border-color: rgba(26,26,46,0.25); background: var(--paper2); }
.scene-card.active { border: 1.5px solid var(--teal); background: var(--teal-light); }
.sc-icon { font-size: 20px; margin-bottom: 2px; }
.sc-name { font-size: 12px; font-weight: 500; color: var(--ink); line-height: 1.3; }
.sc-sub { font-size: 11px; color: var(--muted); line-height: 1.3; }
.scene-card.active .sc-name { color: var(--teal); }

/* ─── SETTINGS ─── */
.settings-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.toggle {
  display: flex; align-items: center; gap: 5px; font-size: 12px;
  padding: 6px 13px; border: 1px solid var(--border); border-radius: 20px;
  cursor: pointer; background: #fff; color: var(--muted); transition: all 0.15s; user-select: none;
}
.toggle.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.toggle .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.lvl-sel {
  font-size: 12px; padding: 6px 12px; border: 1px solid var(--border);
  border-radius: 20px; background: #fff; color: var(--ink);
  font-family: inherit; cursor: pointer; appearance: none;
}

/* ─── CHAT BOX ─── */
.chat-box {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
.chat-head {
  background: var(--ink); padding: 13px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.chat-head-left { display: flex; align-items: center; gap: 10px; }
.ch-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.12); display: flex; align-items: center;
  justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.ch-title { font-size: 13px; font-weight: 500; color: #fff; }
.ch-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 1px; }
.reset-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; transition: background 0.15s;
}
.reset-btn:hover { background: rgba(255,255,255,0.2); }

.msgs {
  padding: 18px 16px; min-height: 320px; max-height: 420px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 14px;
}
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg-row { display: flex; gap: 8px; }
.msg-row.user { flex-direction: row-reverse; }
.msg-av {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
}
.msg-row.ai .msg-av { background: var(--ink); color: #fff; }
.msg-row.user .msg-av { background: #fde8e6; color: #c0392b; }
.msg-body { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
.msg-row.user .msg-body { align-items: flex-end; }

.bubble { border-radius: 4px 14px 14px 14px; padding: 10px 13px; border: 1px solid var(--border); }
.msg-row.ai .bubble { background: var(--paper); }
.msg-row.user .bubble { background: var(--ink); color: #fff; border-radius: 14px 4px 14px 14px; border-color: var(--ink); }

.jp-line { font-size: 14px; line-height: 1.75; }
.rm-line { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 3px; line-height: 1.5; }
.msg-row.user .rm-line { color: rgba(255,255,255,0.5); }
.zh-line { font-size: 12px; color: var(--muted); margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border); line-height: 1.6; }
.msg-row.user .zh-line { color: rgba(255,255,255,0.65); border-color: rgba(255,255,255,0.2); }

.tts-btn {
  background: none; border: 1px solid var(--border); border-radius: 20px;
  padding: 3px 10px; font-size: 11px; color: var(--muted); cursor: pointer;
  font-family: inherit; display: flex; align-items: center; gap: 4px; transition: all 0.15s; margin-top: 3px;
}
.tts-btn:hover { border-color: var(--teal); color: var(--teal); }
.tts-btn.playing { background: var(--teal-light); border-color: var(--teal); color: var(--teal); }

/* typing */
.typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.tdot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: pulse 1.2s infinite; }
.tdot:nth-child(2) { animation-delay: 0.2s; }
.tdot:nth-child(3) { animation-delay: 0.4s; }

/* quick replies */
.qr-area { padding: 0 16px 10px; display: flex; flex-wrap: wrap; gap: 6px; }
.qr {
  font-size: 12px; padding: 6px 13px; border-radius: 20px;
  border: 1px solid var(--border); background: #fff; color: var(--ink);
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.qr:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

/* input */
.input-area {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end; background: var(--paper2);
}
.input-area textarea {
  flex: 1; min-height: 40px; max-height: 110px; padding: 9px 13px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: #fff; font-size: 13px; font-family: inherit;
  color: var(--ink); resize: none; line-height: 1.5; transition: border-color 0.2s;
}
.input-area textarea:focus { outline: none; border-color: var(--teal); }
.input-area textarea::placeholder { color: var(--muted); }
.send-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--ink); color: #fff; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 16px; transition: background 0.2s;
}
.send-btn:hover { background: var(--teal); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* vocab */
.vocab-panel {
  margin-top: 14px; background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; display: none;
}
.vocab-panel.show { display: block; animation: fadeIn 0.3s; }
.vocab-head {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  color: var(--muted); text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.vocab-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.vocab-item {
  display: flex; align-items: baseline; gap: 10px; padding: 9px 12px;
  background: var(--paper); border-radius: var(--radius); border: 1px solid var(--border);
}
.v-jp { font-size: 15px; font-weight: 500; min-width: 70px; }
.v-rm { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); min-width: 80px; }
.v-zh { font-size: 12px; color: var(--ink); flex: 1; }
.v-tts {
  margin-left: auto; background: none; border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--muted);
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.v-tts:hover { border-color: var(--teal); color: var(--teal); }

/* empty */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 50px 20px; color: var(--muted); text-align: center; }
.empty .em { font-size: 36px; opacity: 0.25; }
.empty p { font-size: 13px; line-height: 1.7; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

/* ─── TECH INTERVIEW SPECIAL STYLING ─── */
.cat-tab.techinterview-tab {
  background: linear-gradient(135deg, #1a1a2e 0%, #2d1a4e 100%);
  color: #f0c040; border-color: #3d2a6e;
  font-weight: 700; letter-spacing: 0.03em;
}
.cat-tab.techinterview-tab:hover { opacity: 0.9; }
.cat-tab.techinterview-tab.active { background: #f0c040; color: #1a1a2e; border-color: #f0c040; }

.ti-badge {
  display: inline-block; font-size: 9px; padding: 1px 6px;
  border-radius: 4px; font-weight: 700; letter-spacing: 0.08em;
  margin-bottom: 4px; font-family: 'Space Mono', monospace;
}
.badge-general  { background: #e8f0fe; color: #1a56c4; }
.badge-elec     { background: #fff3e0; color: #b45309; }
.badge-energy   { background: #e8f5e9; color: #2e7d32; }
.badge-software { background: #f3e8ff; color: #6b21a8; }

.scene-card.ti-card {
  border-left: 3px solid transparent;
}
.scene-card.ti-card.badge-general  { border-left-color: #1a56c4; }
.scene-card.ti-card.badge-elec     { border-left-color: #b45309; }
.scene-card.ti-card.badge-energy   { border-left-color: #2e7d32; }
.scene-card.ti-card.badge-software { border-left-color: #6b21a8; }
.scene-card.ti-card.active { border-left-width: 3px; }

.ti-section-head {
  font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); padding: 8px 0 6px;
  border-bottom: 1px solid var(--border); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.ti-section-head::before { content: ''; flex: none; width: 10px; height: 2px; background: currentColor; border-radius: 1px; }

/* mobile */
@media (max-width: 500px) {
  .scene-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .cat-tab { font-size: 11px; padding: 6px 11px; }
  .msgs { max-height: 350px; }
}
</style>
</head>
<body>
<div class="wrap">

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="logo-jp">日本語会話 AI</span>
    <span class="logo-tag">CONVERSATION PRACTICE</span>
  </div>
  <button class="geo-btn" onclick="getLocation()">
    <span class="geo-dot" id="geoDot"></span>
    <span id="geoLabel">位置を取得</span>
  </button>
</header>

<!-- LOCATION CARD -->
<div class="loc-card" id="locCard">
  <div style="font-size:18px;">📍</div>
  <div style="flex:1;">
    <div class="loc-name" id="locName">—</div>
    <div class="loc-hint" id="locHint">检测到位置，推荐对话场景</div>
  </div>
  <button class="loc-use" id="locUseBtn">用此场景</button>
</div>

<!-- KEYWORD -->
<div class="sec-label">自由生成场景</div>
<div class="kw-row">
  <input type="text" id="kwInput" placeholder="输入任意关键词，例如：美容院、引越し、婚活パーティー…" />
  <button class="gen-btn" id="genBtn" onclick="generateScene()">
    <span>＋</span> 生成
  </button>
</div>

<!-- CATEGORIES -->
<div class="sec-label" style="margin-top:4px;">场景分类</div>
<div class="cat-tabs" id="catTabs"></div>

<!-- SCENE GRID -->
<div class="scene-grid" id="sceneGrid"></div>

<!-- SETTINGS -->
<div class="settings-row">
  <div class="toggle on" id="tg-romaji" onclick="tog('romaji',this)"><span class="dot"></span>罗马音</div>
  <div class="toggle on" id="tg-zh" onclick="tog('zh',this)"><span class="dot"></span>中文</div>
  <div class="toggle on" id="tg-tts" onclick="tog('tts',this)"><span class="dot"></span>发音</div>
  <div class="toggle on" id="tg-vocab" onclick="tog('vocab',this)"><span class="dot"></span>单词解析</div>
  <select class="lvl-sel" id="lvlSel">
    <option value="N5">N5 初级</option>
    <option value="N4" selected>N4 入门</option>
    <option value="N3">N3 中级</option>
    <option value="N2">N2 进阶</option>
    <option value="N1">N1 高级</option>
  </select>
</div>

<!-- CHAT -->
<div class="chat-box">
  <div class="chat-head">
    <div class="chat-head-left">
      <div class="ch-avatar" id="chAvatar">?</div>
      <div>
        <div class="ch-title" id="chTitle">请选择场景开始练习</div>
        <div class="ch-sub" id="chSub">从上方分类中选择一个场景</div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetChat()" title="重置">↺</button>
  </div>
  <div class="msgs" id="msgs">
    <div class="empty">
      <div class="em">会</div>
      <p>选择左侧场景卡片，或输入关键词生成场景<br>也可点击右上角位置按钮自动匹配当前场所</p>
    </div>
  </div>
  <div class="qr-area" id="qrArea"></div>
  <div class="input-area">
    <textarea id="userInput" placeholder="日本語・中文・英語 都可以…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">↑</button>
  </div>
</div>

<!-- VOCAB -->
<div class="vocab-panel" id="vocabPanel">
  <div class="vocab-head">
    <span>重点词汇 · 語彙</span>
    <span id="vocabCount"></span>
  </div>
  <div class="vocab-list" id="vocabList"></div>
</div>

</div><!-- /wrap -->

<script>
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=AIzaSyDiEtitDzx3Dgi5bHNtlewJULhLv50iViU';

      { id: 'restaurant',icon: '🍜', name: 'レストラン',   sub: '注文・おすすめ',         av: '飯',  role: 'レストランの店員', ctx: '席案内、注文受付、おすすめ料理の説明、追加注文、お会計' },

      { id: 'ti_bim',       icon: '🏗️', name: 'BIM・電気設備設計',    sub: 'Revit MEP・設備BIM',            av: 'BIM',
        role: '設備設計事務所の技術面接官',
        ctx: `BIM（Building Information Modeling）を用いた電気設備設計職の面接。
質問分野：①Revit MEP・AutoCAD MEPの操作②電気設備設計（照明・動力・弱電）③BIMによる干渉チェック④建築・構造・設備の連携フロー⑤確認申請・設計図書の作成
実務質問例：「RevitでBIMモデルから電気設備の数量を自動集計した経験は？」「他分野（建築・機械設備）との調整をどのように行いましたか？」
重要語彙：照明設計（しょうめいせっけい）、幹線（かんせん）、分電盤（ぶんでんばん）、弱電（じゃくでん）、竣工図（しゅんこうず）` },
    ]
  },
  {
    id: 'emergency', label: '紧急情况', icon: '🆘',
    scenes: [
      { id: 'lost',      icon: '🔍', name: '道に迷った',   sub: '道案内・Google Map',     av: '迷',  role: '通りすがりの人', ctx: '道に迷った時の助けを求める、地図を見ながら説明、目印の説明' },
      { id: 'sick',      icon: '🤒', name: '体の不調',     sub: '救急・急病',             av: '救',  role: '救急病院の受付', ctx: '急病・怪我での救急来院、症状の説明、アレルギー確認' },
      { id: 'accident',  icon: '⚠️', name: '事故・トラブル', sub: '報告・保険',           av: '事',  role: '警察・保険会社', ctx: '交通事故報告、物品破損のお詫び、保険申請の説明' },
      { id: 'stolen',    icon: '🔒', name: '紛失・盗難',   sub: '警察への届出',           av: '届',  role: '警察の窓口', ctx: 'パスポート紛失、財布盗難、遺失物センター、届出書類' },
    ]
  },
];

// flatten for lookup
const ALL_SCENES = {};
CATEGORIES.forEach(cat => cat.scenes.forEach(s => { ALL_SCENES[s.id] = s; }));

// STATE
const S = {
  cat: 'daily',
  scene: null,
  msgs: [],
  loading: false,
  settings: { romaji: true, zh: true, tts: true, vocab: true },
};

// ── RENDER CATEGORIES ──
function renderCats() {
  document.getElementById('catTabs').innerHTML = CATEGORIES.map(c => `
    <button class="cat-tab ${c.id === 'techinterview' ? 'techinterview-tab' : ''} ${S.cat === c.id ? 'active' : ''}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>${c.label}
    </button>
  `).join('');
}

function selectCat(id) {
  S.cat = id;
  renderCats();
  renderScenes();
}

// ── RENDER SCENES ──
const TI_GROUPS = [
  { label: '通用面试流程', badge: 'badge-general',  ids: ['ti_general','ti_tech_qa','ti_salary'] },
  { label: '电气工程',     badge: 'badge-elec',     ids: ['ti_elec_gen','ti_elec_hv','ti_elec_auto'] },
  { label: '能源领域',     badge: 'badge-energy',   ids: ['ti_solar','ti_wind','ti_energy_mgr','ti_battery'] },
  { label: '电气设计软件', badge: 'badge-software', ids: ['ti_eplan','ti_autocad','ti_spice','ti_scada','ti_bim'] },
];

const TI_BADGE_MAP = {};
TI_GROUPS.forEach(g => g.ids.forEach(id => { TI_BADGE_MAP[id] = g.badge; }));

function renderScenes() {
  const cat = CATEGORIES.find(c => c.id === S.cat);
  const grid = document.getElementById('sceneGrid');

  if (S.cat === 'techinterview') {
    // Grouped render
    let html = '';
    TI_GROUPS.forEach(g => {
      html += `<div class="ti-section-head" style="grid-column:1/-1;">${g.label}</div>`;
      g.ids.forEach(id => {
        const sc = ALL_SCENES[id];
        if (!sc) return;
        const badge = g.badge;
        const badgeLabels = { 'badge-general':'通用','badge-elec':'電気','badge-energy':'エネルギー','badge-software':'ソフト' };
        html += `
          <div class="scene-card ti-card ${badge} ${S.scene?.id === sc.id ? 'active' : ''}" onclick="selectScene('${sc.id}')">
            <div class="sc-icon">${sc.icon}</div>
            <span class="ti-badge ${badge}">${badgeLabels[badge]}</span>
            <div class="sc-name">${sc.name}</div>
            <div class="sc-sub">${sc.sub}</div>
          </div>`;
      });
    });
    grid.innerHTML = html;
    grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(145px, 1fr))';
  } else {
    grid.innerHTML = cat.scenes.map(sc => `
      <div class="scene-card ${S.scene?.id === sc.id ? 'active' : ''}" onclick="selectScene('${sc.id}')">
        <div class="sc-icon">${sc.icon}</div>
        <div class="sc-name">${sc.name}</div>
        <div class="sc-sub">${sc.sub}</div>
      </div>
    `).join('');
  }
}

// ── SELECT SCENE ──
function selectScene(id) {
  const sc = ALL_SCENES[id];
  if (!sc) return;
  S.scene = sc;
  S.msgs = [];
  renderScenes();
  updateHead(sc);
  clearChat();
  setTimeout(startConv, 250);
}

function updateHead(sc) {
  document.getElementById('chAvatar').textContent = sc.av;
  document.getElementById('chTitle').textContent = sc.name + ' — ' + sc.sub;
  document.getElementById('chSub').textContent = sc.role + 'があなたと会話します';
}

// ── GENERATE CUSTOM SCENE ──
async function generateScene() {
  const kw = document.getElementById('kwInput').value.trim();
  if (!kw) return;
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = '生成中…';
  try {
    const prompt = `根据关键词生成一个日语对话练习场景的JSON，只输出纯JSON，不要markdown代码块，不要任何其他文字。格式：{"id":"custom","icon":"单个emoji","name":"场景名（日语2-5字）","sub":"副标题（日语，4-8字）","av":"2字缩写","role":"AI角色（日语）","ctx":"详细背景（日语，描述如何扮演这个角色）"} 关键词：${kw}`;
    const res = await fetch(GEMINI_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const sc = JSON.parse(clean);
    sc.id = 'custom_' + Date.now();
    ALL_SCENES[sc.id] = sc;
    // add to custom category or create
    let customCat = CATEGORIES.find(c => c.id === '_custom');
    if (!customCat) {
      customCat = { id: '_custom', label: '自定义', icon: '✨', scenes: [] };
      CATEGORIES.unshift(customCat);
    }
    customCat.scenes.unshift(sc);
    S.cat = '_custom';
    renderCats();
    renderScenes();
    S.scene = sc;
    S.msgs = [];
    updateHead(sc);
    clearChat();
    setTimeout(startConv, 250);
    document.getElementById('kwInput').value = '';
  } catch(e) {
    alert('生成失败，请重试');
  }
  btn.disabled = false; btn.innerHTML = '<span>＋</span> 生成';
}

// ── GEOLOCATION ──
function getLocation() {
  const dot = document.getElementById('geoDot');
  const label = document.getElementById('geoLabel');
  label.textContent = '取得中…';
  if (!navigator.geolocation) { label.textContent = '非対応'; return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    dot.classList.add('on');
    label.textContent = `${lat.toFixed(3)},${lng.toFixed(3)}`;
    try {
      const prompt = `根据GPS坐标判断用户可能在什么类型的日本场所，只输出纯JSON不要任何其他内容：{"placeName":"推测场所名（日语）","sceneId":"从以下选一个：conbini/supermart/restaurant/izakaya/cafe/pharmacy/bank/post/hospital/cityhall/station/taxi/airport/realestate/delivery/interview/office/hotel/shopping/lost/sick/other","hint":"简短说明（中文15字以内）"} 坐标：纬度${lat.toFixed(4)}, 经度${lng.toFixed(4)}，日本`;
      const res = await fetch(GEMINI_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      const data = await res.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const json = JSON.parse(text.replace(/```json|```/g,'').trim());
      document.getElementById('locName').textContent = json.placeName;
      document.getElementById('locHint').textContent = json.hint;
      document.getElementById('locCard').classList.add('show');
      document.getElementById('locUseBtn').onclick = () => {
        if (json.sceneId !== 'other' && ALL_SCENES[json.sceneId]) selectScene(json.sceneId);
        else { document.getElementById('kwInput').value = json.placeName; generateScene(); }
        document.getElementById('locCard').classList.remove('show');
      };
    } catch(e) {
      document.getElementById('locName').textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      document.getElementById('locHint').textContent = '无法识别具体场所';
      document.getElementById('locCard').classList.add('show');
    }
  }, () => { label.textContent = '取得失敗'; dot.style.background='#c0392b'; });
}

// ── SYSTEM PROMPT ──
function sysPrompt() {
  const sc = S.scene;
  const lv = document.getElementById('lvlSel').value;
  return `あなたは日本語会話練習AIです。
シーン：${sc.name}（${sc.sub}）
あなたの役割：${sc.role}
背景：${sc.ctx}
レベル：${lv}（語彙・文法の難易度を${lv}に合わせる）

毎回の返答は必ず以下のJSON形式のみで出力（他のテキスト一切不可）：
{"jp":"日本語返答（自然な会話体）","zh":"中文翻译（口语）","romaji":"ローマ字（Hepburn、単語間スペース）","words":[{"jp":"単語","reading":"読み","zh":"中文"}],"suggestions":["推薦回答1","推薦回答2","推薦回答3"]}

words：今の返答から重要な単語を最大4つ選ぶ。
suggestions：ユーザーの次の${lv}レベルに適した自然な返答候補3つ（日本語）。
キャラクターを維持し、会話を自然に進めてください。`;
}

// ── CHAT ──
function clearChat() {
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('qrArea').innerHTML = '';
  document.getElementById('vocabPanel').classList.remove('show');
  document.getElementById('vocabList').innerHTML = '';
}

function resetChat() {
  if (!S.scene) return;
  S.msgs = [];
  clearChat();
  setTimeout(startConv, 200);
}

async function startConv() {
  if (!S.scene) return;
  S.loading = true;
  showTyping();
  try {
    const res = await fetch(GEMINI_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: sysPrompt() }] },
        contents: [{ role: 'user', parts: [{ text: '会話を始めてください。役になりきって最初のあいさつや声かけをしてください。' }] }]
      })
    });
    const data = await res.json();
    removeTyping(); S.loading = false;
    const txt = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    addAI(parse(txt));
    S.msgs.push({ role: 'model', parts: [{ text: txt }] });
  } catch(e) {
    removeTyping(); S.loading = false;
    addAI({ jp: 'エラーが発生しました。もう一度お試しください。', zh: '发生错误，请重试。', romaji: '', words: [], suggestions: [] });
  }
}

async function sendMsg() {
  if (S.loading || !S.scene) return;
  const ta = document.getElementById('userInput');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = ''; ta.style.height = '40px';
  document.getElementById('qrArea').innerHTML = '';
  addUser(text);
  S.msgs.push({ role: 'user', parts: [{ text }] });
  S.loading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();
  try {
    const history = S.msgs.slice(-14);
    if (history[0]?.role !== 'user') history.unshift({ role: 'user', parts: [{ text: '会話を始めてください。' }] });
    const res = await fetch(GEMINI_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: sysPrompt() }] },
        contents: history
      })
    });
    const data = await res.json();
    removeTyping(); S.loading = false;
    document.getElementById('sendBtn').disabled = false;
    const txt = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    addAI(parse(txt));
    S.msgs.push({ role: 'model', parts: [{ text: txt }] });
  } catch(e) {
    removeTyping(); S.loading = false;
    document.getElementById('sendBtn').disabled = false;
    addAI({ jp: 'エラー。もう一度お試しください。', zh: '网络错误，请重试。', romaji: '', words: [], suggestions: [] });
  }
}

function parse(txt) {
  try { return JSON.parse(txt.replace(/```json|```/g,'').trim()); }
  catch(e) { return { jp: txt, zh: '', romaji: '', words: [], suggestions: [] }; }
}

// ── RENDER MESSAGES ──
function addAI(d) {
  const area = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const av = S.scene?.av || 'AI';
  const rmHtml = S.settings.romaji && d.romaji ? `<div class="rm-line">${esc(d.romaji)}</div>` : '';
  const zhHtml = S.settings.zh && d.zh ? `<div class="zh-line">${esc(d.zh)}</div>` : '';
  const ttsHtml = S.settings.tts ? `<button class="tts-btn" onclick="speak('${escAttr(d.jp)}',this)">▶ 発音</button>` : '';
  row.innerHTML = `
    <div class="msg-av">${av}</div>
    <div class="msg-body">
      <div class="bubble">
        ${rmHtml}
        <div class="jp-line">${esc(d.jp)}</div>
        ${zhHtml}
      </div>
      ${ttsHtml}
    </div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
  if (d.suggestions?.length) renderQR(d.suggestions);
  if (S.settings.vocab && d.words?.length) renderVocab(d.words);
  if (S.settings.tts) setTimeout(() => speak(d.jp, null), 400);
}

function addUser(text) {
  const area = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="msg-av">你</div><div class="msg-body"><div class="bubble"><div class="jp-line">${esc(text)}</div></div></div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function renderQR(suggestions) {
  document.getElementById('qrArea').innerHTML = suggestions.map(s =>
    `<button class="qr" onclick="useQR('${escAttr(s)}')">${esc(s)}</button>`
  ).join('');
}
function useQR(t) { document.getElementById('userInput').value = t; sendMsg(); }

function renderVocab(words) {
  document.getElementById('vocabCount').textContent = words.length + ' 語';
  document.getElementById('vocabList').innerHTML = words.map(w => `
    <div class="vocab-item">
      <span class="v-jp">${esc(w.jp)}</span>
      <span class="v-rm">${esc(w.reading||'')}</span>
      <span class="v-zh">${esc(w.zh)}</span>
      <button class="v-tts" onclick="speak('${escAttr(w.jp)}',this)">▶</button>
    </div>`).join('');
  document.getElementById('vocabPanel').classList.add('show');
}

function showTyping() {
  const area = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg-row ai'; d.id = 'typingRow';
  d.innerHTML = `<div class="msg-av">${S.scene?.av||'AI'}</div><div class="msg-body"><div class="bubble"><div class="typing"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div></div></div>`;
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
}
function removeTyping() { document.getElementById('typingRow')?.remove(); }

// ── TTS ──
function speak(text, btn) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP'; u.rate = 0.88;
  const v = window.speechSynthesis.getVoices().find(x => x.lang === 'ja-JP' || x.lang === 'ja');
  if (v) u.voice = v;
  if (btn) { btn.classList.add('playing'); u.onend = () => btn.classList.remove('playing'); }
  window.speechSynthesis.speak(u);
}

// ── SETTINGS ──
function tog(key, el) {
  S.settings[key] = !S.settings[key];
  el.classList.toggle('on', S.settings[key]);
}

// ── HELPERS ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function autoResize(el) { el.style.height='40px'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

// ── INIT ──
if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
renderCats();
renderScenes();
</script>
