<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日本語会話 AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f7f4ef;color:#1a1a2e;min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:0 16px 80px}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid rgba(26,26,46,0.1);margin-bottom:20px;position:sticky;top:0;background:#f7f4ef;z-index:100}
.logo-jp{font-size:19px;font-weight:700}
.logo-en{font-family:'Space Mono',monospace;font-size:10px;color:#7a7a8c;letter-spacing:.1em;margin-left:8px}
.geo-btn{font-size:12px;color:#7a7a8c;background:#edeae3;border-radius:20px;padding:6px 14px;border:1px solid rgba(26,26,46,0.1);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.gdot{width:7px;height:7px;border-radius:50%;background:#7a7a8c;flex-shrink:0}
.gdot.on{background:#1a7a6e;box-shadow:0 0 0 3px rgba(26,122,110,0.15)}

/* KEY BAR */
.key-bar{background:#fff;border:1.5px solid rgba(26,26,46,0.12);border-radius:14px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.key-bar label{font-size:11px;font-family:'Space Mono',monospace;color:#7a7a8c;letter-spacing:.1em;white-space:nowrap}
.key-bar input{flex:1;min-width:200px;height:38px;border-radius:9px;border:1px solid rgba(26,26,46,0.12);padding:0 12px;font-size:13px;font-family:monospace;background:#f7f4ef;color:#1a1a2e;outline:none;transition:border-color .2s}
.key-bar input:focus{border-color:#1a7a6e}
.key-bar input::placeholder{color:#bbb}
.btn-save{height:38px;padding:0 18px;background:#1a1a2e;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .2s}
.btn-save:hover{background:#1a7a6e}
.key-status{font-size:12px;white-space:nowrap}

/* LOC CARD */
.loc-card{background:#e0f5f3;border:1px solid rgba(26,122,110,0.2);border-radius:12px;padding:12px 16px;margin-bottom:18px;display:none;align-items:center;gap:12px}
.loc-card.show{display:flex}
.loc-name{font-size:14px;font-weight:500;color:#1a7a6e}
.loc-hint{font-size:12px;color:#7a7a8c;margin-top:2px}
.loc-use{font-size:12px;padding:6px 14px;background:#1a7a6e;color:#fff;border:none;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap}

/* KW ROW */
.sec-lbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:#7a7a8c;text-transform:uppercase;margin-bottom:10px}
.kw-row{display:flex;gap:8px;margin-bottom:18px}
.kw-row input{flex:1;height:42px;border-radius:12px;padding:0 14px;border:1px solid rgba(26,26,46,0.1);background:#fff;font-size:13px;font-family:inherit;color:#1a1a2e;outline:none;transition:border-color .2s}
.kw-row input:focus{border-color:#1a7a6e}
.kw-row input::placeholder{color:#bbb}
.btn-gen{height:42px;padding:0 18px;background:#1a1a2e;color:#f7f4ef;border:none;border-radius:12px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background .2s}
.btn-gen:hover{background:#2d2d4e}
.btn-gen:disabled{opacity:.45;cursor:not-allowed}

/* CATS */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-tab{font-size:12px;padding:7px 14px;border-radius:20px;border:1px solid rgba(26,26,46,0.1);background:#fff;color:#1a1a2e;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:4px}
.cat-tab:hover{border-color:#1a1a2e}
.cat-tab.active{background:#1a1a2e;color:#f7f4ef;border-color:#1a1a2e}
.cat-tab.ti-tab{background:linear-gradient(135deg,#1a1a2e,#2d1a4e);color:#f0c040;border-color:#3d2a6e;font-weight:700}
.cat-tab.ti-tab.active{background:#f0c040;color:#1a1a2e;border-color:#f0c040}

/* SCENE GRID */
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:20px}
.scene-card{background:#fff;border:1px solid rgba(26,26,46,0.1);border-radius:12px;padding:12px 13px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px}
.scene-card:hover{border-color:rgba(26,26,46,0.25);background:#edeae3}
.scene-card.active{border:1.5px solid #1a7a6e;background:#e0f5f3}
.sc-icon{font-size:20px;margin-bottom:2px}
.sc-name{font-size:12px;font-weight:500;line-height:1.3}
.sc-sub{font-size:11px;color:#7a7a8c;line-height:1.3}
.scene-card.active .sc-name{color:#1a7a6e}
.ti-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;font-weight:700;margin-bottom:3px;font-family:'Space Mono',monospace}
.bg{background:#e8f0fe;color:#1a56c4}.be{background:#fff3e0;color:#b45309}
.bn{background:#e8f5e9;color:#2e7d32}.bs{background:#f3e8ff;color:#6b21a8}
.scene-card.be{border-left:3px solid #b45309}.scene-card.bn{border-left:3px solid #2e7d32}
.scene-card.bs{border-left:3px solid #6b21a8}.scene-card.bg{border-left:3px solid #1a56c4}
.ti-sec{grid-column:1/-1;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#7a7a8c;padding:8px 0 6px;border-bottom:1px solid rgba(26,26,46,0.1);margin-bottom:4px}

/* SETTINGS */
.settings-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.toggle{display:flex;align-items:center;gap:5px;font-size:12px;padding:6px 13px;border:1px solid rgba(26,26,46,0.1);border-radius:20px;cursor:pointer;background:#fff;color:#7a7a8c;transition:all .15s;user-select:none}
.toggle.on{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.toggle .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.lvl-sel{font-size:12px;padding:6px 12px;border:1px solid rgba(26,26,46,0.1);border-radius:20px;background:#fff;color:#1a1a2e;font-family:inherit;cursor:pointer;appearance:none}

/* CHAT */
.chat-box{background:#fff;border:1px solid rgba(26,26,46,0.1);border-radius:18px;overflow:hidden}
.chat-head{background:#1a1a2e;padding:13px 18px;display:flex;align-items:center;justify-content:space-between}
.ch-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.ch-title{font-size:13px;font-weight:500;color:#fff}
.ch-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px}
.reset-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.reset-btn:hover{background:rgba(255,255,255,0.2)}
.msgs{padding:18px 16px;min-height:320px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(26,26,46,0.1);border-radius:3px}
.msg-row{display:flex;gap:8px}
.msg-row.user{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.msg-row.ai .msg-av{background:#1a1a2e;color:#fff}
.msg-row.user .msg-av{background:#fde8e6;color:#c0392b}
.msg-body{max-width:75%;display:flex;flex-direction:column;gap:4px}
.msg-row.user .msg-body{align-items:flex-end}
.bubble{border-radius:4px 14px 14px 14px;padding:10px 13px;border:1px solid rgba(26,26,46,0.1)}
.msg-row.ai .bubble{background:#f7f4ef}
.msg-row.user .bubble{background:#1a1a2e;color:#fff;border-radius:14px 4px 14px 14px;border-color:#1a1a2e}
.rm-line{font-family:'Space Mono',monospace;font-size:10px;color:#7a7a8c;margin-bottom:3px;line-height:1.5}
.msg-row.user .rm-line{color:rgba(255,255,255,0.5)}
.jp-line{font-size:14px;line-height:1.75}
.zh-line{font-size:12px;color:#7a7a8c;margin-top:7px;padding-top:7px;border-top:1px solid rgba(26,26,46,0.1);line-height:1.6}
.msg-row.user .zh-line{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2)}
.tts-btn{background:none;border:1px solid rgba(26,26,46,0.1);border-radius:20px;padding:3px 10px;font-size:11px;color:#7a7a8c;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all .15s;margin-top:3px}
.tts-btn:hover{border-color:#1a7a6e;color:#1a7a6e}
.tts-btn.playing{background:#e0f5f3;border-color:#1a7a6e;color:#1a7a6e}
.typing{display:flex;gap:5px;align-items:center;padding:4px 0}
.tdot{width:6px;height:6px;border-radius:50%;background:#7a7a8c;animation:pulse 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
.qr-area{padding:0 16px 10px;display:flex;flex-wrap:wrap;gap:6px}
.qr{font-size:12px;padding:6px 13px;border-radius:20px;border:1px solid rgba(26,26,46,0.1);background:#fff;color:#1a1a2e;cursor:pointer;font-family:inherit;transition:all .15s}
.qr:hover{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.input-area{padding:10px 14px;border-top:1px solid rgba(26,26,46,0.1);display:flex;gap:8px;align-items:flex-end;background:#edeae3}
.input-area textarea{flex:1;min-height:40px;max-height:110px;padding:9px 13px;border:1px solid rgba(26,26,46,0.1);border-radius:12px;background:#fff;font-size:13px;font-family:inherit;color:#1a1a2e;resize:none;line-height:1.5;outline:none;transition:border-color .2s}
.input-area textarea:focus{border-color:#1a7a6e}
.input-area textarea::placeholder{color:#bbb}
.send-btn{width:40px;height:40px;border-radius:50%;background:#1a1a2e;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:background .2s}
.send-btn:hover{background:#1a7a6e}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:50px 20px;color:#7a7a8c;text-align:center}
.empty .em{font-size:36px;opacity:.2}
.empty p{font-size:13px;line-height:1.7}
.vocab-panel{margin-top:14px;background:#fff;border:1px solid rgba(26,26,46,0.1);border-radius:18px;overflow:hidden;display:none}
.vocab-panel.show{display:block}
.vocab-head{padding:10px 16px;border-bottom:1px solid rgba(26,26,46,0.1);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;color:#7a7a8c;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.vocab-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.vocab-item{display:flex;align-items:baseline;gap:10px;padding:9px 12px;background:#f7f4ef;border-radius:10px;border:1px solid rgba(26,26,46,0.08)}
.v-jp{font-size:15px;font-weight:500;min-width:70px}
.v-rm{font-family:'Space Mono',monospace;font-size:10px;color:#7a7a8c;min-width:80px}
.v-zh{font-size:12px;flex:1}
.v-tts{margin-left:auto;background:none;border:1px solid rgba(26,26,46,0.1);border-radius:20px;padding:3px 10px;font-size:11px;color:#7a7a8c;cursor:pointer;font-family:inherit;white-space:nowrap}
.v-tts:hover{border-color:#1a7a6e;color:#1a7a6e}
@media(max-width:500px){.scene-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}.msgs{max-height:350px}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div>
    <span class="logo-jp">日本語会話 AI</span>
    <span class="logo-en">CONVERSATION PRACTICE</span>
  </div>
  <button class="geo-btn" onclick="getLocation()">
    <span class="gdot" id="gdot"></span>
    <span id="geoLbl">位置を取得</span>
  </button>
</header>

<!-- KEY BAR -->
<div class="key-bar">
  <label>GEMINI API KEY</label>
  <input id="kInput" type="text" placeholder="粘贴你的 Key（AIzaSy...），点保存后永久记住"/>
  <span class="key-status" id="kStatus">⚠️ 未设置</span>
  <button class="btn-save" onclick="saveKey()">保存</button>
</div>

<!-- LOC CARD -->
<div class="loc-card" id="locCard">
  <div style="font-size:18px">📍</div>
  <div style="flex:1">
    <div class="loc-name" id="locName">—</div>
    <div class="loc-hint" id="locHint">检测到位置，推荐对话场景</div>
  </div>
  <button class="loc-use" id="locUseBtn">用此场景</button>
</div>

<div class="sec-lbl">自由生成场景</div>
<div class="kw-row">
  <input type="text" id="kwInput" placeholder="输入关键词生成场景，例如：美容院、引越し、婚活パーティー…"/>
  <button class="btn-gen" id="genBtn" onclick="generateScene()">＋ 生成</button>
</div>

<div class="sec-lbl" style="margin-top:4px">场景分类</div>
<div class="cat-tabs" id="catTabs"></div>
<div class="scene-grid" id="sceneGrid"></div>

<div class="settings-row">
  <div class="toggle on" onclick="tog('romaji',this)"><span class="dot"></span>罗马音</div>
  <div class="toggle on" onclick="tog('zh',this)"><span class="dot"></span>中文</div>
  <div class="toggle on" onclick="tog('tts',this)"><span class="dot"></span>发音</div>
  <div class="toggle on" onclick="tog('vocab',this)"><span class="dot"></span>单词解析</div>
  <select class="lvl-sel" id="lvlSel">
    <option value="N5">N5 初级</option>
    <option value="N4" selected>N4 入门</option>
    <option value="N3">N3 中级</option>
    <option value="N2">N2 进阶</option>
    <option value="N1">N1 高级</option>
  </select>
</div>

<div class="chat-box">
  <div class="chat-head">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="ch-av" id="chAv">?</div>
      <div>
        <div class="ch-title" id="chTitle">请选择场景开始练习</div>
        <div class="ch-sub" id="chSub">从上方分类中选择一个场景</div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetChat()">↺</button>
  </div>
  <div class="msgs" id="msgs">
    <div class="empty">
      <div class="em">会</div>
      <p>选择上方场景，或输入关键词生成场景<br>也可点击右上角位置按钮自动匹配当前场所</p>
    </div>
  </div>
  <div class="qr-area" id="qrArea"></div>
  <div class="input-area">
    <textarea id="userInput" placeholder="日本語・中文・英語 都可以…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="this.style.height='40px';this.style.height=Math.min(this.scrollHeight,110)+'px'"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">↑</button>
  </div>
</div>

<div class="vocab-panel" id="vocabPanel">
  <div class="vocab-head"><span>重点词汇 · 語彙</span><span id="vocabCount"></span></div>
  <div class="vocab-list" id="vocabList"></div>
</div>

</div>
<script>
// ── KEY ──
let GK = localStorage.getItem('gk') || '';
function gurl(){ return 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+GK; }
function initKeyUI(){
  const s=document.getElementById('kStatus'), inp=document.getElementById('kInput');
  if(GK){ s.textContent='✅ 已连接'; s.style.color='#1a7a6e'; inp.value=GK.slice(0,8)+'••••••••••••••••••••••••••••'; }
  else { s.textContent='⚠️ 未设置'; s.style.color='#c0392b'; }
}
function saveKey(){
  const v=document.getElementById('kInput').value.trim();
  if(v.startsWith('AIza')&&v.length>30){ GK=v; localStorage.setItem('gk',v); initKeyUI(); }
  else if(v.includes('•')){ alert('已保存，无需重复输入'); }
  else { alert('格式错误，Key 应以 AIzaSy 开头'); }
}

// ── SCENES ──
const CATS=[
  {id:'daily',label:'日常生活',icon:'🏡',scenes:[
    {id:'conbini',icon:'🏪',name:'コンビニ',sub:'会計・レジ対応',av:'CVS',role:'コンビニ店員',ctx:'レジでの会計、温め、宅配便受取、ATM案内'},
    {id:'supermart',icon:'🛒',name:'スーパー',sub:'買い物・値段確認',av:'店',role:'スーパーの店員',ctx:'商品の場所案内、値段確認、特売品説明、袋の有無'},
    {id:'restaurant',icon:'🍜',name:'レストラン',sub:'注文・おすすめ',av:'飯',role:'レストランの店員',ctx:'席案内、注文受付、おすすめ料理の説明、追加注文、お会計'},
    {id:'izakaya',icon:'🍶',name:'居酒屋',sub:'飲み会・注文',av:'酒',role:'居酒屋の店員',ctx:'飲み物・食べ物の注文、おすすめ、締めの一品、お会計'},
    {id:'cafe',icon:'☕',name:'カフェ',sub:'ドリンク注文・持帰り',av:'珈',role:'カフェの店員',ctx:'ドリンク・フードの注文、カスタマイズ、テイクアウト対応'},
    {id:'pharmacy',icon:'💊',name:'薬局',sub:'薬・症状の相談',av:'薬',role:'薬剤師',ctx:'症状を聞いて薬を提案、用法説明、処方箋対応'},
    {id:'beauty',icon:'✂️',name:'美容院',sub:'カット・スタイル相談',av:'髪',role:'美容師',ctx:'カットスタイルの相談、シャンプー、カラー、施術説明'},
    {id:'laundry',icon:'👕',name:'クリーニング',sub:'衣類の預け・受取',av:'洗',role:'クリーニング店員',ctx:'衣類の預け入れ、素材確認、日数説明、受取'},
  ]},
  {id:'transport',label:'交通出行',icon:'🚃',scenes:[
    {id:'station',icon:'🚉',name:'駅・切符',sub:'乗り換え・路線案内',av:'駅',role:'駅員',ctx:'乗り換え案内、切符購入、ICカードチャージ、忘れ物'},
    {id:'taxi',icon:'🚕',name:'タクシー',sub:'行先・料金',av:'車',role:'タクシー運転手',ctx:'行き先を聞く、ルート確認、料金説明、おつり'},
    {id:'bus',icon:'🚌',name:'バス',sub:'路線・停留所確認',av:'BUS',role:'バス運転手',ctx:'停留所の案内、料金、乗り継ぎの説明'},
    {id:'airport',icon:'✈️',name:'空港',sub:'チェックイン・案内',av:'空',role:'空港スタッフ',ctx:'チェックイン、手荷物預け、搭乗口案内'},
    {id:'rental',icon:'🚗',name:'レンタカー',sub:'車の貸出・返却',av:'RC',role:'レンタカー店員',ctx:'車種説明、保険確認、燃料説明、返却手続き'},
  ]},
  {id:'public',label:'公共服务',icon:'🏛️',scenes:[
    {id:'bank',icon:'🏦',name:'銀行',sub:'口座・電話確認',av:'銀',role:'銀行員',ctx:'口座開設、カード申込後の電話確認、在留資格確認'},

}
function resetChat(){if(!S.scene)return;S.msgs=[];clearChat();setTimeout(startConv,200);}
function sysP(){
  const sc=S.scene,lv=document.getElementById('lvlSel').value;
  return `あなたは日本語会話練習AIです。シーン：${sc.name}（${sc.sub}）。役割：${sc.role}。背景：${sc.ctx}。レベル：${lv}。

{"jp":"日本語返答","zh":"中文翻译","romaji":"ローマ字（Hepburn）","words":[{"jp":"単語","reading":"読み","zh":"意味"}],"suggestions":["回答1","回答2","回答3"]}
wordsは重要語彙を最大4つ。suggestionsは${lv}レベルの自然な返答候補3つ（日本語）。`;
}
async function callAI(msgs){
  if(!GK){alert('请先设置 API Key！');return null;}
  const r=await fetch(gurl(),{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system_instruction:{parts:[{text:sysP()}]},contents:msgs})});
  const d=await r.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
}
async function startConv(){
  if(!S.scene)return;
  S.loading=true;showTyping();
  try{
    const txt=await callAI([{role:'user',parts:[{text:'会話を始めてください。役になりきって最初の声かけをしてください。'}]}]);
    removeTyping();S.loading=false;
    if(txt){const d=parse(txt);addAI(d);S.msgs.push({role:'model',parts:[{text:txt}]});}
  }catch(e){removeTyping();S.loading=false;addAI({jp:'エラーが発生しました。もう一度お試しください。',zh:'发生错误，请重试。',romaji:'',words:[],suggestions:[]});}
}
async function sendMsg(){
  if(S.loading||!S.scene)return;
  const ta=document.getElementById('userInput');
  const text=ta.value.trim();if(!text)return;
  ta.value='';ta.style.height='40px';
  document.getElementById('qrArea').innerHTML='';
  addUser(text);S.msgs.push({role:'user',parts:[{text}]});
  S.loading=true;document.getElementById('sendBtn').disabled=true;showTyping();
  try{
    const hist=S.msgs.slice(-14);
    if(hist[0]?.role!=='user')hist.unshift({role:'user',parts:[{text:'会話を始めてください。'}]});
    const txt=await callAI(hist);
    removeTyping();S.loading=false;document.getElementById('sendBtn').disabled=false;
    if(txt){const d=parse(txt);addAI(d);S.msgs.push({role:'model',parts:[{text:txt}]});}
  }catch(e){removeTyping();S.loading=false;document.getElementById('sendBtn').disabled=false;addAI({jp:'エラー',zh:'网络错误，请重试',romaji:'',words:[],suggestions:[]});}
}
function parse(txt){try{return JSON.parse(txt.replace(/```json|```/g,'').trim());}catch(e){return{jp:txt,zh:'',romaji:'',words:[],suggestions:[]};}}
function addAI(d){
  const area=document.getElementById('msgs'),av=S.scene?.av||'AI';
  const row=document.createElement('div');row.className='msg-row ai';
  const rm=S.set.romaji&&d.romaji?`<div class="rm-line">${esc(d.romaji)}</div>`:'';
  const zh=S.set.zh&&d.zh?`<div class="zh-line">${esc(d.zh)}</div>`:'';
  const tts=S.set.tts?`<button class="tts-btn" onclick="speak('${escA(d.jp)}',this)">▶ 発音</button>`:'';
  row.innerHTML=`<div class="msg-av">${av}</div><div class="msg-body"><div class="bubble">${rm}<div class="jp-line">${esc(d.jp)}</div>${zh}</div>${tts}</div>`;
  area.appendChild(row);area.scrollTop=area.scrollHeight;
  if(d.suggestions?.length)renderQR(d.suggestions);
  if(S.set.vocab&&d.words?.length)renderVocab(d.words);
  if(S.set.tts)setTimeout(()=>speak(d.jp,null),400);
}
function addUser(text){
  const area=document.getElementById('msgs'),row=document.createElement('div');
  row.className='msg-row user';
  row.innerHTML=`<div class="msg-av">你</div><div class="msg-body"><div class="bubble"><div class="jp-line">${esc(text)}</div></div></div>`;
  area.appendChild(row);area.scrollTop=area.scrollHeight;
}
function renderQR(s){document.getElementById('qrArea').innerHTML=s.map(x=>`<button class="qr" onclick="useQR('${escA(x)}')">${esc(x)}</button>`).join('');}
function useQR(t){document.getElementById('userInput').value=t;sendMsg();}
function renderVocab(words){
  document.getElementById('vocabCount').textContent=words.length+' 語';
  document.getElementById('vocabList').innerHTML=words.map(w=>`<div class="vocab-item"><span class="v-jp">${esc(w.jp)}</span><span class="v-rm">${esc(w.reading||'')}</span><span class="v-zh">${esc(w.zh)}</span><button class="v-tts" onclick="speak('${escA(w.jp)}',this)">▶</button></div>`).join('');
  document.getElementById('vocabPanel').classList.add('show');
}
function showTyping(){
  const area=document.getElementById('msgs'),d=document.createElement('div');
  d.className='msg-row ai';d.id='typingRow';
  d.innerHTML=`<div class="msg-av">${S.scene?.av||'AI'}</div><div class="msg-body"><div class="bubble"><div class="typing"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div></div></div>`;
  area.appendChild(d);area.scrollTop=area.scrollHeight;
}
function removeTyping(){document.getElementById('typingRow')?.remove();}
function speak(text,btn){
  if(!('speechSynthesis'in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='ja-JP';u.rate=0.88;
  const v=window.speechSynthesis.getVoices().find(x=>x.lang==='ja-JP'||x.lang==='ja');
  if(v)u.voice=v;
  if(btn){btn.classList.add('playing');u.onend=()=>btn.classList.remove('playing');}
  window.speechSynthesis.speak(u);
}
function tog(key,el){S.set[key]=!S.set[key];el.classList.toggle('on',S.set[key]);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

  const btn=document.getElementById('genBtn');btn.disabled=true;btn.textContent='生成中…';
  try{
    const prompt=`根据关键词生成一个日语对话练习场景的JSON，只输出纯JSON不要任何其他内容：{"id":"custom","icon":"单个emoji","name":"场景名（日语2-5字）","sub":"副标题（日语4-8字）","av":"2字缩写","role":"AI角色（日语）","ctx":"详细背景（日语）"} 关键词：${kw}`;
    const r=await fetch(gurl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    const data=await r.json();
    const txt=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const sc=JSON.parse(txt.replace(/```json|```/g,'').trim());
    sc.id='custom_'+Date.now();ALL[sc.id]=sc;
    let cc=CATS.find(c=>c.id==='_custom');
    if(!cc){cc={id:'_custom',label:'自定义',icon:'✨',scenes:[]};CATS.unshift(cc);}
    cc.scenes.unshift(sc);S.cat='_custom';
    renderCats();renderScenes();selScene(sc.id);
    document.getElementById('kwInput').value='';
  }catch(e){alert('生成失败，请重试');}
  btn.disabled=false;btn.innerHTML='＋ 生成';
}
function getLocation(){
  if(!navigator.geolocation)return;
  const dot=document.getElementById('gdot'),lbl=document.getElementById('geoLbl');
  lbl.textContent='取得中…';
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    dot.classList.add('on');lbl.textContent=`${lat.toFixed(3)},${lng.toFixed(3)}`;
    if(!GK)return;
    try{
      const prompt=`根据GPS坐标判断用户可能在什么类型的日本场所，只输出纯JSON：{"placeName":"推测场所名（日语）","sceneId":"conbini/supermart/restaurant/izakaya/cafe/pharmacy/bank/post/hospital/station/taxi/airport/realestate/delivery/interview/office/hotel/shopping/lost/sick/other","hint":"简短说明（中文15字以内）"} 坐标：纬度${lat.toFixed(4)}, 经度${lng.toFixed(4)}，日本`;
      const r=await fetch(gurl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const data=await r.json();
      const json=JSON.parse((data.candidates?.[0]?.content?.parts?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
      document.getElementById('locName').textContent=json.placeName;
      document.getElementById('locHint').textContent=json.hint;
      document.getElementById('locCard').classList.add('show');
      document.getElementById('locUseBtn').onclick=()=>{
        if(json.sceneId!=='other'&&ALL[json.sceneId])selScene(json.sceneId);
        else{document.getElementById('kwInput').value=json.placeName;generateScene();}
        document.getElementById('locCard').classList.remove('show');
      };
    }catch(e){}
  },()=>{lbl.textContent='取得失敗';});
}
// INIT
if('speechSynthesis'in window)window.speechSynthesis.getVoices();
renderCats();
renderScenes();
initKeyUI();
</script>
