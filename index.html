<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語会話 AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --ink2: #2d2d4e;
  --paper: #f8f5f0;
  --paper2: #ede9e2;
  --red: #c0392b;
  --red-light: #fdecea;
  --gold: #c9a84c;
  --teal: #1a7a6e;
  --teal-light: #e0f5f3;
  --muted: #7a7a8c;
  --border: rgba(26,26,46,0.12);
  --radius: 12px;
  --radius-lg: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(192,57,43,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 10% 80%, rgba(26,122,110,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.app-wrap { max-width: 780px; margin: 0 auto; padding: 0 16px 80px; position: relative; z-index: 1; }

/* ── HEADER ── */
.app-header {
  padding: 28px 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.logo {
  display: flex; align-items: baseline; gap: 10px;
}
.logo-jp {
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--ink);
}
.logo-en {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--muted); letter-spacing: 0.1em;
}
.geo-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted);
  background: var(--paper2); border-radius: 20px;
  padding: 5px 12px; border: 1px solid var(--border);
  cursor: pointer; transition: all 0.2s;
}
.geo-badge:hover { border-color: var(--teal); color: var(--teal); }
.geo-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); transition: background 0.3s;
}
.geo-dot.active { background: var(--teal); box-shadow: 0 0 0 3px rgba(26,122,110,0.15); }

/* ── LOCATION DETECTED CARD ── */
.location-card {
  background: var(--teal-light); border: 1px solid rgba(26,122,110,0.2);
  border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 20px; display: none;
  animation: slideIn 0.3s ease;
}
.location-card.show { display: flex; align-items: center; gap: 12px; }
.location-card .loc-icon { font-size: 20px; }
.location-card .loc-text { flex: 1; }
.location-card .loc-name { font-size: 14px; font-weight: 500; color: var(--teal); }
.location-card .loc-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }
.location-card .loc-btn {
  font-size: 12px; padding: 6px 14px; background: var(--teal); color: #fff;
  border: none; border-radius: 20px; cursor: pointer; font-family: inherit; white-space: nowrap;
}

/* ── SCENE PICKER ── */
.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 0.15em; color: var(--muted);
  text-transform: uppercase; margin-bottom: 12px;
}

.keyword-row {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.keyword-row input {
  flex: 1; height: 44px; border-radius: var(--radius); padding: 0 16px;
  border: 1px solid var(--border); background: #fff; font-size: 14px;
  font-family: 'Zen Kaku Gothic New', sans-serif; color: var(--ink);
  transition: border-color 0.2s;
}
.keyword-row input:focus { outline: none; border-color: var(--teal); }
.keyword-row input::placeholder { color: var(--muted); font-size: 13px; }
.gen-btn {
  height: 44px; padding: 0 20px; background: var(--ink); color: var(--paper);
  border: none; border-radius: var(--radius); font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer; white-space: nowrap;
  display: flex; align-items: center; gap: 6px; transition: background 0.2s;
}
.gen-btn:hover { background: var(--ink2); }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.gen-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

.scene-pills {
  display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 24px;
}
.pill {
  font-size: 12px; padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: #fff; color: var(--ink);
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.pill:hover { border-color: var(--ink); }
.pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ── CHAT ── */
.chat-container {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}

.chat-top {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--ink);
}
.chat-scene-name {
  font-size: 13px; font-weight: 500; color: var(--paper); letter-spacing: 0.02em;
}
.chat-scene-sub { font-size: 11px; color: rgba(248,245,240,0.55); margin-top: 2px; }
.chat-controls { display: flex; gap: 8px; }
.ctrl-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  color: var(--paper); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.2); }
.ctrl-btn.active { background: var(--teal); border-color: var(--teal); }

.messages-area {
  padding: 20px 18px; min-height: 360px; max-height: 460px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
}

/* scrollbar */
.messages-area::-webkit-scrollbar { width: 4px; }
.messages-area::-webkit-scrollbar-track { background: transparent; }
.messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg-row { display: flex; gap: 10px; }
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.msg-row.ai .msg-avatar { background: var(--ink); color: var(--paper); }
.msg-row.user .msg-avatar { background: var(--red-light); color: var(--red); }

.msg-body { max-width: 72%; display: flex; flex-direction: column; gap: 4px; }
.msg-row.user .msg-body { align-items: flex-end; }

.bubble {
  border-radius: 4px 16px 16px 16px; padding: 12px 14px;
  border: 1px solid var(--border);
}
.msg-row.ai .bubble { background: #fafaf8; }
.msg-row.user .bubble {
  background: var(--ink); color: var(--paper);
  border-radius: 16px 4px 16px 16px; border-color: var(--ink);
}

.jp-text {
  font-size: 15px; line-height: 1.7; font-weight: 400;
  display: flex; flex-wrap: wrap; align-items: baseline; gap: 2px;
}
.jp-word { display: inline-flex; flex-direction: column; align-items: center; margin: 1px 2px; }
.jp-word .romaji { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); line-height: 1.2; }
.msg-row.user .jp-word .romaji { color: rgba(248,245,240,0.5); }
.jp-word .kanji { font-size: 15px; }

.zh-text {
  font-size: 12px; color: var(--muted); margin-top: 8px;
  padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.6;
}
.msg-row.user .zh-text { color: rgba(248,245,240,0.6); border-color: rgba(255,255,255,0.15); }

.tts-btn {
  align-self: flex-start; background: none; border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--muted);
  cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px;
  transition: all 0.15s; margin-top: 4px;
}
.tts-btn:hover { border-color: var(--teal); color: var(--teal); }
.tts-btn.playing { background: var(--teal-light); border-color: var(--teal); color: var(--teal); }
.msg-row.user .tts-btn { color: rgba(248,245,240,0.6); border-color: rgba(255,255,255,0.2); }
.msg-row.user .tts-btn:hover { border-color: rgba(255,255,255,0.5); color: var(--paper); }

/* quick replies */
.quick-area {
  padding: 0 18px 12px; display: flex; flex-wrap: wrap; gap: 6px;
}
.qr {
  font-size: 12px; padding: 6px 13px; border-radius: 20px;
  border: 1px solid var(--border); background: #fff; color: var(--ink);
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.qr:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* input area */
.input-area {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--paper2);
}
.input-area textarea {
  flex: 1; min-height: 42px; max-height: 120px; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: #fff; font-size: 13px; font-family: 'Zen Kaku Gothic New', sans-serif;
  color: var(--ink); resize: none; line-height: 1.5; overflow: hidden;
  transition: border-color 0.2s;
}
.input-area textarea:focus { outline: none; border-color: var(--teal); }
.input-area textarea::placeholder { color: var(--muted); }

.send-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--ink); color: var(--paper); border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s; font-size: 17px;
}
.send-btn:hover { background: var(--teal); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* loading */
.typing-indicator {
  display: flex; gap: 5px; align-items: center; padding: 6px 0;
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); animation: pulse 1.3s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

/* vocab panel */
.vocab-panel {
  margin-top: 16px; background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; display: none;
}
.vocab-panel.show { display: block; animation: slideIn 0.3s ease; }
.vocab-header {
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 500; color: var(--muted);
  font-family: 'Space Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.vocab-list { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }
.vocab-item {
  display: flex; align-items: baseline; gap: 12px; padding: 10px 12px;
  background: var(--paper); border-radius: var(--radius); border: 1px solid var(--border);
}
.vocab-jp { font-size: 16px; font-weight: 500; min-width: 80px; }
.vocab-reading { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); min-width: 80px; }
.vocab-zh { font-size: 13px; color: var(--ink); }
.vocab-tts {
  margin-left: auto; background: none; border: 1px solid var(--border); border-radius: 20px;
  padding: 3px 10px; font-size: 11px; color: var(--muted); cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 4px;
}
.vocab-tts:hover { border-color: var(--teal); color: var(--teal); }

/* empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 60px 20px; color: var(--muted); text-align: center;
}
.empty-state .em-char { font-size: 40px; opacity: 0.3; }
.empty-state .em-text { font-size: 13px; line-height: 1.7; }

@keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

/* settings bar */
.settings-bar {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center;
}
.toggle-chip {
  display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted);
  padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px;
  cursor: pointer; background: #fff; transition: all 0.15s; user-select: none;
}
.toggle-chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.toggle-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

/* level badge */
.level-select {
  font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 20px;
  background: #fff; color: var(--ink); font-family: inherit; cursor: pointer;
  appearance: none; -webkit-appearance: none;
}
.level-select:focus { outline: none; border-color: var(--teal); }
</style>
</head>
<body>
<div class="app-wrap">

  <!-- HEADER -->
  <header class="app-header">
    <div class="logo">
      <span class="logo-jp">日本語会話 AI</span>
      <span class="logo-en">CONVERSATION PRACTICE</span>
    </div>
    <button class="geo-badge" id="geoBtn" onclick="getLocation()">
      <span class="geo-dot" id="geoDot"></span>
      <span id="geoLabel">位置を取得</span>
    </button>
  </header>

  <!-- LOCATION CARD -->
  <div class="location-card" id="locationCard">
    <div class="loc-icon">📍</div>
    <div class="loc-text">
      <div class="loc-name" id="locName">—</div>
      <div class="loc-hint" id="locHint">检测到附近场所，已推荐对话场景</div>
    </div>
    <button class="loc-btn" id="locBtn">用此场景</button>
  </div>

  <!-- SCENE INPUT -->
  <div class="section-label">场景设定 · シーンを選ぶ</div>
  <div class="keyword-row">
    <input type="text" id="keywordInput" placeholder="输入关键词，例如：银行、居酒屋、コンビニ、病院..." />
    <button class="gen-btn" id="genBtn" onclick="generateScene()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1v14M1 8h14"/></svg>
      生成场景
    </button>
  </div>

  <div class="scene-pills" id="scenePills"></div>

  <!-- SETTINGS BAR -->
  <div class="settings-bar">
    <div class="toggle-chip on" id="toggleRomaji" onclick="toggleSetting('romaji', this)">
      <span class="dot"></span> 罗马音
    </div>
    <div class="toggle-chip on" id="toggleZh" onclick="toggleSetting('zh', this)">
      <span class="dot"></span> 中文
    </div>
    <div class="toggle-chip on" id="toggleTTS" onclick="toggleSetting('tts', this)">
      <span class="dot"></span> 发音播放
    </div>
    <div class="toggle-chip on" id="toggleVocab" onclick="toggleSetting('vocab', this)">
      <span class="dot"></span> 单词解析
    </div>
    <select class="level-select" id="levelSelect">
      <option value="N5">N5（初级）</option>
      <option value="N4" selected>N4（入门）</option>
      <option value="N3">N3（中级）</option>
      <option value="N2">N2（进阶）</option>
      <option value="N1">N1（高级）</option>
    </select>
  </div>

  <!-- CHAT -->
  <div class="chat-container">
    <div class="chat-top">
      <div>
        <div class="chat-scene-name" id="chatSceneName">请选择或生成一个场景</div>
        <div class="chat-scene-sub" id="chatSceneSub">AI 将扮演对话角色进行真实练习</div>
      </div>
      <div class="chat-controls">
        <button class="ctrl-btn" onclick="resetChat()" title="重置对话">↺</button>
      </div>
    </div>

    <div class="messages-area" id="messagesArea">
      <div class="empty-state">
        <div class="em-char">会</div>
        <div class="em-text">选择上方场景，或输入关键词生成场景<br>也可以点击"位置を取得"自动识别当前位置</div>
      </div>
    </div>

    <div class="quick-area" id="quickArea"></div>

    <div class="input-area">
      <textarea id="userInput" placeholder="日本語・中文・英語 都可以..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">↑</button>
    </div>
  </div>

  <!-- VOCAB PANEL -->
  <div class="vocab-panel" id="vocabPanel">
    <div class="vocab-header">
      <span>重点单词解析 · 語彙リスト</span>
      <span id="vocabCount" style="font-weight:400;font-size:11px;"></span>
    </div>
    <div class="vocab-list" id="vocabList"></div>
  </div>

</div>

<script>
// ── STATE ──
const state = {
  scene: null,
  messages: [],
  loading: false,
  settings: { romaji: true, zh: true, tts: true, vocab: true },
  level: 'N4',
  geoScene: null,
  speaking: false,
};

// ── BUILT-IN SCENES ──
const builtinScenes = [
  { id: 'bank', label: '🏦 銀行', name: '三菱UFJ銀行 — カード申込確認', sub: '銀行員があなたに確認電話をかけています', role: '銀行員の担当者', ctx: '申し込み後の電話確認、本人確認、在留資格、住所、開設目的を確認する' },
  { id: 'conbini', label: '🏪 コンビニ', name: 'セブンイレブン', sub: 'お会計・温め・宅配便', role: 'コンビニ店員', ctx: 'レジでの会計、商品の温め、宅配便の受け取りなど' },
  { id: 'izakaya', label: '🍶 居酒屋', name: '居酒屋・ランチ注文', sub: 'ご注文・おすすめ・お会計', role: '居酒屋の店員', ctx: '注文受付、おすすめ、追加注文、お会計まで' },
  { id: 'hospital', label: '🏥 病院', name: '内科クリニック', sub: '受付・診察・薬局', role: 'クリニックの受付スタッフ', ctx: '患者の症状を聞き、保険証確認、診察案内まで' },
  { id: 'station', label: '🚃 駅', name: '電車・乗り換え案内', sub: '切符・定期・路線', role: '駅員', ctx: '乗り換え案内、きっぷ購入、ICカードチャージなど' },
  { id: 'interview', label: '💼 バイト面接', name: 'アルバイト面接', sub: 'カフェのバイト面接', role: 'カフェの店長', ctx: '留学生のアルバイト面接、自己紹介、志望動機、シフトの確認' },
  { id: 'rental', label: '🏠 不動産', name: '不動産屋', sub: '物件案内・契約説明', role: '不動産会社の担当者', ctx: '物件の案内、家賃・敷金説明、契約条件の説明' },
  { id: 'post', label: '📮 郵便局', name: '郵便局・国際郵便', sub: '荷物・海外送金', role: '郵便局の窓口担当', ctx: '荷物の発送、国際郵便、重さ・料金の確認' },
];

// Render scene pills
function renderPills() {
  document.getElementById('scenePills').innerHTML = builtinScenes.map(s => `
    <button class="pill ${state.scene?.id === s.id ? 'active' : ''}" onclick="selectScene('${s.id}')">${s.label}</button>
  `).join('');
}
renderPills();

// ── SCENE SELECTION ──
function selectScene(id) {
  const s = builtinScenes.find(x => x.id === id);
  if (!s) return;
  state.scene = s;
  state.messages = [];
  renderPills();
  updateChatHeader(s.name, s.sub);
  resetMessages();
  setTimeout(() => startConversation(), 200);
}

function updateChatHeader(name, sub) {
  document.getElementById('chatSceneName').textContent = name;
  document.getElementById('chatSceneSub').textContent = sub;
}

// ── GENERATE SCENE FROM KEYWORD ──
async function generateScene() {
  const kw = document.getElementById('keywordInput').value.trim();
  if (!kw) return;
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = '生成中...';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        system: '根据关键词生成一个日语对话练习场景的JSON，只输出JSON，不要任何其他内容。格式：{"id":"custom","label":"emoji+简称","name":"场景全名（日语）","sub":"副标题（日语）","role":"AI扮演的角色（日语）","ctx":"场景背景说明（日语，详细描述AI应该怎么扮演）"}',
        messages: [{ role: 'user', content: `关键词：${kw}` }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const scene = JSON.parse(clean);
    scene.id = 'custom_' + Date.now();
    builtinScenes.push(scene);
    state.scene = scene;
    state.messages = [];
    renderPills();
    updateChatHeader(scene.name, scene.sub);
    resetMessages();
    setTimeout(() => startConversation(), 200);
    document.getElementById('keywordInput').value = '';
  } catch(e) {
    alert('生成失败，请重试');
  }
  btn.disabled = false;
  btn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1v14M1 8h14"/></svg>生成场景`;
}

// ── GEOLOCATION ──
const PLACE_KEYWORDS = {
  'bank|銀行|financial': 'bank', 'コンビニ|convenience|seven|lawson|family': 'conbini',
  'restaurant|izakaya|居酒屋|食堂|dining|food': 'izakaya', 'hospital|clinic|クリニック|医院': 'hospital',
  'station|駅|train|railway': 'station', 'office|work|会社|job': 'interview',
  'apartment|rental|不動産|estate|住': 'rental', 'post|郵便|mail': 'post',
};

function matchSceneFromPlace(name) {
  const n = name.toLowerCase();
  for (const [keys, id] of Object.entries(PLACE_KEYWORDS)) {
    if (keys.split('|').some(k => n.includes(k))) return id;
  }
  return null;
}

function getLocation() {
  const btn = document.getElementById('geoBtn');
  const dot = document.getElementById('geoDot');
  const label = document.getElementById('geoLabel');
  label.textContent = '取得中...';
  dot.style.background = '#c9a84c';

  if (!navigator.geolocation) {
    label.textContent = '非対応'; return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude, longitude } = pos.coords;
    dot.classList.add('active');
    label.textContent = `${latitude.toFixed(3)}, ${longitude.toFixed(3)}`;

    // Use Claude to figure out what kind of place based on coords
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 200,
          system: '根据坐标推断可能的场所类型和名称，只输出JSON：{"placeName":"场所名（日语）","placeType":"bank/conbini/izakaya/hospital/station/interview/rental/post/other","confidence":"high/medium/low","hint":"简短说明（中文）"}',
          messages: [{ role: 'user', content: `坐标：纬度${latitude.toFixed(4)}, 经度${longitude.toFixed(4)}。这在日本东京附近，根据地理位置推断最可能在什么类型的地方（可结合常识：住宅区/商业区/车站附近等）` }]
        })
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      const json = JSON.parse(text.replace(/```json|```/g, '').trim());

      const card = document.getElementById('locationCard');
      document.getElementById('locName').textContent = json.placeName;
      document.getElementById('locHint').textContent = json.hint;
      card.classList.add('show');
      state.geoScene = json.placeType;

      document.getElementById('locBtn').onclick = () => {
        if (json.placeType !== 'other') selectScene(json.placeType);
        else {
          document.getElementById('keywordInput').value = json.placeName;
          generateScene();
        }
        card.classList.remove('show');
      };
    } catch(e) {
      document.getElementById('locName').textContent = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
      document.getElementById('locHint').textContent = '无法识别具体场所';
      document.getElementById('locationCard').classList.add('show');
    }
  }, err => {
    label.textContent = '位置取得失敗'; dot.style.background = '#c0392b';
  });
}

// ── CHAT LOGIC ──
function resetMessages() {
  document.getElementById('messagesArea').innerHTML = '';
  document.getElementById('quickArea').innerHTML = '';
  document.getElementById('vocabPanel').classList.remove('show');
  document.getElementById('vocabList').innerHTML = '';
}

function resetChat() {
  if (!state.scene) return;
  state.messages = [];
  resetMessages();
  setTimeout(() => startConversation(), 200);
}

function buildSystemPrompt() {
  const s = state.scene;
  const level = document.getElementById('levelSelect').value;
  return `あなたは日本語会話練習アプリのAIです。シーン：${s.name}。あなたの役割：${s.role}。背景：${s.ctx}。

レベル：${level}（語彙・文法の難易度を${level}に合わせる）

毎回の返答は必ずこのJSON形式のみで出力してください（他のテキスト不可）：
{
  "jp": "日本語の返答（自然な会話体）",
  "zh": "中文翻译（口语化）",
  "romaji": "完整罗马音（Hepburn式，每个词之间空格）",
  "words": [{"jp":"単語","reading":"読み方","zh":"中文意思"}],
  "suggestions": ["推荐回答1（日语）","推荐回答2（日语）","推荐回答3（日语）"]
}

words：当前回答中5个以内的重点词汇，优先选难词和敬语表达。
suggestions：用户接下来3个最自然的回答选项（日语），符合${level}水平。
请保持角色，自然推进对话。`;
}

async function startConversation() {
  if (!state.scene) return;
  state.loading = true;
  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildSystemPrompt(),
        messages: [{ role: 'user', content: '会話を始めてください。最初のあいさつから自然に始めてください。' }]
      })
    });
    const data = await res.json();
    removeTyping();
    state.loading = false;
    const parsed = parseResponse(data.content?.[0]?.text || '{}');
    addAiMessage(parsed);
    state.messages.push({ role: 'assistant', content: data.content?.[0]?.text });
  } catch(e) {
    removeTyping(); state.loading = false;
    addRawMsg('ai', 'エラーが発生しました。もう一度お試しください。', '发生错误，请重试。', '');
  }
}

async function sendMsg() {
  if (state.loading || !state.scene) return;
  const ta = document.getElementById('userInput');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = ''; ta.style.height = '42px';
  document.getElementById('quickArea').innerHTML = '';

  addUserMessage(text);
  state.messages.push({ role: 'user', content: text });
  state.loading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const msgs = [
      { role: 'user', content: '会話を始めてください。最初のあいさつから自然に始めてください。' },
      ...state.messages.slice(-12)
    ];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildSystemPrompt(),
        messages: msgs
      })
    });
    const data = await res.json();
    removeTyping();
    state.loading = false;
    document.getElementById('sendBtn').disabled = false;
    const parsed = parseResponse(data.content?.[0]?.text || '{}');
    addAiMessage(parsed);
    state.messages.push({ role: 'assistant', content: data.content?.[0]?.text });
  } catch(e) {
    removeTyping(); state.loading = false;
    document.getElementById('sendBtn').disabled = false;
    addRawMsg('ai', 'エラーが発生しました。', '网络错误，请重试。', '');
  }
}

function parseResponse(text) {
  try {
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch(e) {
    return { jp: text, zh: '', romaji: '', words: [], suggestions: [] };
  }
}

// ── RENDER MESSAGES ──
function addAiMessage(data) {
  const area = document.getElementById('messagesArea');
  const row = document.createElement('div');
  row.className = 'msg-row ai';

  const jp = data.jp || '';
  const romaji = data.romaji || '';
  const zh = data.zh || '';

  row.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-body">
      <div class="bubble">
        <div class="jp-text">${renderJpWithRomaji(jp, romaji)}</div>
        ${state.settings.zh && zh ? `<div class="zh-text">${zh}</div>` : ''}
      </div>
      ${state.settings.tts ? `<button class="tts-btn" onclick="speak('${escAttr(jp)}', this)">▶ 発音</button>` : ''}
    </div>
  `;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;

  if (data.suggestions?.length && state.settings.tts !== false) {
    renderQuickReplies(data.suggestions);
  }

  if (state.settings.vocab && data.words?.length) {
    renderVocab(data.words);
  }

  if (state.settings.tts) {
    setTimeout(() => speakAuto(jp), 300);
  }
}

function addUserMessage(text) {
  const area = document.getElementById('messagesArea');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="msg-avatar">你</div>
    <div class="msg-body">
      <div class="bubble">
        <div class="jp-text">${escHtml(text)}</div>
      </div>
    </div>
  `;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function addRawMsg(role, jp, zh, romaji) {
  addAiMessage({ jp, zh, romaji, words: [], suggestions: [] });
}

function renderJpWithRomaji(jp, romaji) {
  if (!state.settings.romaji || !romaji) return escHtml(jp);
  const jpParts = jp.split(/\s+/);
  const rmParts = romaji.split(/\s+/);
  let result = '';
  jpParts.forEach((w, i) => {
    const r = rmParts[i] || '';
    result += `<span class="jp-word">${r ? `<span class="romaji">${escHtml(r)}</span>` : ''}<span class="kanji">${escHtml(w)}</span></span>`;
  });
  return result || escHtml(jp);
}

function renderQuickReplies(suggestions) {
  const area = document.getElementById('quickArea');
  area.innerHTML = suggestions.map(s =>
    `<button class="qr" onclick="useQR('${escAttr(s)}')">${escHtml(s)}</button>`
  ).join('');
}

function useQR(text) {
  document.getElementById('userInput').value = text;
  sendMsg();
}

function renderVocab(words) {
  if (!words?.length) return;
  const panel = document.getElementById('vocabPanel');
  const list = document.getElementById('vocabList');
  document.getElementById('vocabCount').textContent = `${words.length} 語`;

  list.innerHTML = words.map(w => `
    <div class="vocab-item">
      <span class="vocab-jp">${escHtml(w.jp)}</span>
      <span class="vocab-reading">${escHtml(w.reading || '')}</span>
      <span class="vocab-zh">${escHtml(w.zh)}</span>
      <button class="vocab-tts" onclick="speak('${escAttr(w.jp)}', this)">▶ 聞く</button>
    </div>
  `).join('');
  panel.classList.add('show');
}

// ── TYPING INDICATOR ──
function showTyping() {
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.className = 'msg-row ai'; div.id = 'typingRow';
  div.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-body"><div class="bubble"><div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}
function removeTyping() {
  document.getElementById('typingRow')?.remove();
}

// ── TTS ──
function speak(text, btn) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP'; utter.rate = 0.9;
  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang === 'ja-JP' || v.lang === 'ja');
  if (jaVoice) utter.voice = jaVoice;
  if (btn) {
    btn.classList.add('playing');
    utter.onend = () => btn.classList.remove('playing');
  }
  window.speechSynthesis.speak(utter);
}

function speakAuto(text) {
  if (!state.settings.tts) return;
  speak(text, null);
}

// ── SETTINGS TOGGLES ──
function toggleSetting(key, el) {
  state.settings[key] = !state.settings[key];
  el.classList.toggle('on', state.settings[key]);
}

// ── HELPERS ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
function autoResize(el) {
  el.style.height = '42px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Preload voices
if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
</script>
