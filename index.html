<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日本語会話 AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e; --ink2: #2d2d4e; --paper: #f7f4ef; --paper2: #edeae3;
  --teal: #1a7a6e; --teal-light: #e0f5f3; --muted: #7a7a8c;
  --border: rgba(26,26,46,0.1); --radius: 12px; --radius-lg: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
.wrap { max-width: 800px; margin: 0 auto; padding: 0 16px 100px; }
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 0 18px; border-bottom: 1px solid var(--border);
  margin-bottom: 22px; position: sticky; top: 0; background: var(--paper); z-index: 100;
}
.logo { display: flex; align-items: baseline; gap: 8px; }
.logo-jp { font-size: 20px; font-weight: 700; color: var(--ink); }
.logo-tag { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.12em; }
.geo-btn {
  display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted);
  background: var(--paper2); border-radius: 20px; padding: 6px 14px;
  border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.geo-btn:hover { border-color: var(--teal); color: var(--teal); }
.geo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; flex-shrink: 0; }
.geo-dot.on { background: var(--teal); box-shadow: 0 0 0 3px rgba(26,122,110,0.15); }
.loc-card {
  background: var(--teal-light); border: 1px solid rgba(26,122,110,0.2);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 18px;
  display: none; align-items: center; gap: 12px;
}
.loc-card.show { display: flex; }
.loc-name { font-size: 14px; font-weight: 500; color: var(--teal); }
.loc-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }
.loc-use { font-size: 12px; padding: 6px 16px; background: var(--teal); color: #fff; border: none; border-radius: 20px; cursor: pointer; font-family: inherit; white-space: nowrap; }
.kw-row { display: flex; gap: 8px; margin-bottom: 20px; }
.kw-row input {
  flex: 1; height: 42px; border-radius: var(--radius); padding: 0 14px;
  border: 1px solid var(--border); background: #fff; font-size: 13px;
  font-family: inherit; color: var(--ink); transition: border-color 0.2s;
}
.kw-row input:focus { outline: none; border-color: var(--teal); }
.kw-row input::placeholder { color: var(--muted); }
.gen-btn {
  height: 42px; padding: 0 18px; background: var(--ink); color: var(--paper);
  border: none; border-radius: var(--radius); font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer; white-space: nowrap; transition: background 0.2s;
}
.gen-btn:hover { background: var(--ink2); }
.gen-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.sec-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
.cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.cat-tab {
  display: flex; align-items: center; gap: 5px; font-size: 12px; padding: 7px 14px;
  border-radius: 20px; border: 1px solid var(--border); background: #fff; color: var(--ink);
  cursor: pointer; transition: all 0.15s; font-family: inherit; font-weight: 500;
}
.cat-tab:hover { border-color: var(--ink); }
.cat-tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.cat-tab.ti-tab { background: linear-gradient(135deg,#1a1a2e,#2d1a4e); color: #f0c040; border-color: #3d2a6e; font-weight: 700; }
.cat-tab.ti-tab.active { background: #f0c040; color: #1a1a2e; border-color: #f0c040; }
.scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px,1fr)); gap: 8px; margin-bottom: 22px; min-height: 60px; }
.scene-card {
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 13px; cursor: pointer; transition: all 0.15s;
  display: flex; flex-direction: column; gap: 4px;
}
.scene-card:hover { border-color: rgba(26,26,46,0.25); background: var(--paper2); }
.scene-card.active { border: 1.5px solid var(--teal); background: var(--teal-light); }
.sc-icon { font-size: 20px; margin-bottom: 2px; }
.sc-name { font-size: 12px; font-weight: 500; color: var(--ink); line-height: 1.3; }
.sc-sub { font-size: 11px; color: var(--muted); line-height: 1.3; }
.scene-card.active .sc-name { color: var(--teal); }
.ti-badge { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 4px; font-family: 'Space Mono', monospace; }
.bg { background:#e8f0fe;color:#1a56c4; } .be { background:#fff3e0;color:#b45309; }
.bn { background:#e8f5e9;color:#2e7d32; } .bs { background:#f3e8ff;color:#6b21a8; }
.scene-card.be { border-left: 3px solid #b45309; }
.scene-card.bn { border-left: 3px solid #2e7d32; }
.scene-card.bs { border-left: 3px solid #6b21a8; }
.scene-card.bg { border-left: 3px solid #1a56c4; }
.ti-sec { grid-column:1/-1; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); padding:8px 0 6px; border-bottom:1px solid var(--border); margin-bottom:4px; }
.settings-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.toggle { display: flex; align-items: center; gap: 5px; font-size: 12px; padding: 6px 13px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: #fff; color: var(--muted); transition: all 0.15s; user-select: none; }
.toggle.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.toggle .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.lvl-sel { font-size: 12px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; background: #fff; color: var(--ink); font-family: inherit; cursor: pointer; appearance: none; }
.chat-box { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.chat-head { background: var(--ink); padding: 13px 18px; display: flex; align-items: center; justify-content: space-between; }
.chat-head-left { display: flex; align-items: center; gap: 10px; }
.ch-avatar { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
.ch-title { font-size: 13px; font-weight: 500; color: #fff; }
.ch-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 1px; }
.reset-btn { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.reset-btn:hover { background: rgba(255,255,255,0.2); }
.msgs { padding: 18px 16px; min-height: 320px; max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.msg-row { display: flex; gap: 8px; }
.msg-row.user { flex-direction: row-reverse; }
.msg-av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.msg-row.ai .msg-av { background: var(--ink); color: #fff; }
.msg-row.user .msg-av { background: #fde8e6; color: #c0392b; }
.msg-body { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
.msg-row.user .msg-body { align-items: flex-end; }
.bubble { border-radius: 4px 14px 14px 14px; padding: 10px 13px; border: 1px solid var(--border); }
.msg-row.ai .bubble { background: var(--paper); }
.msg-row.user .bubble { background: var(--ink); color: #fff; border-radius: 14px 4px 14px 14px; border-color: var(--ink); }
.jp-line { font-size: 14px; line-height: 1.75; }
.rm-line { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 3px; line-height: 1.5; }
.msg-row.user .rm-line { color: rgba(255,255,255,0.5); }
.zh-line { font-size: 12px; color: var(--muted); margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border); line-height: 1.6; }
.msg-row.user .zh-line { color: rgba(255,255,255,0.65); border-color: rgba(255,255,255,0.2); }
.tts-btn { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--muted); cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px; transition: all 0.15s; margin-top: 3px; }
.tts-btn:hover { border-color: var(--teal); color: var(--teal); }
.tts-btn.playing { background: var(--teal-light); border-color: var(--teal); color: var(--teal); }
.typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.tdot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: pulse 1.2s infinite; }
.tdot:nth-child(2) { animation-delay: 0.2s; }
.tdot:nth-child(3) { animation-delay: 0.4s; }
.qr-area { padding: 0 16px 10px; display: flex; flex-wrap: wrap; gap: 6px; }
.qr { font-size: 12px; padding: 6px 13px; border-radius: 20px; border: 1px solid var(--border); background: #fff; color: var(--ink); cursor: pointer; transition: all 0.15s; font-family: inherit; }
.qr:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
.input-area { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; background: var(--paper2); }
.input-area textarea { flex: 1; min-height: 40px; max-height: 110px; padding: 9px 13px; border: 1px solid var(--border); border-radius: var(--radius); background: #fff; font-size: 13px; font-family: inherit; color: var(--ink); resize: none; line-height: 1.5; transition: border-color 0.2s; }
.input-area textarea:focus { outline: none; border-color: var(--teal); }
.input-area textarea::placeholder { color: var(--muted); }
.send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--ink); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; transition: background 0.2s; }
.send-btn:hover { background: var(--teal); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.vocab-panel { margin-top: 14px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; display: none; }
.vocab-panel.show { display: block; }
.vocab-head { padding: 10px 16px; border-bottom: 1px solid var(--border); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }
.vocab-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.vocab-item { display: flex; align-items: baseline; gap: 10px; padding: 9px 12px; background: var(--paper); border-radius: var(--radius); border: 1px solid var(--border); }
.v-jp { font-size: 15px; font-weight: 500; min-width: 70px; }
.v-rm { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); min-width: 80px; }
.v-zh { font-size: 12px; color: var(--ink); flex: 1; }
.v-tts { margin-left: auto; background: none; border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--muted); cursor: pointer; font-family: inherit; white-space: nowrap; }
.v-tts:hover { border-color: var(--teal); color: var(--teal); }
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 50px 20px; color: var(--muted); text-align: center; }
.empty .em { font-size: 36px; opacity: 0.25; }
.empty p { font-size: 13px; line-height: 1.7; }
@keyframes pulse { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }
@media (max-width:500px) { .scene-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))} .cat-tab{font-size:11px;padding:6px 11px} .msgs{max-height:350px} }
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo">
    <span class="logo-jp">日本語会話 AI</span>
    <span class="logo-tag">CONVERSATION PRACTICE</span>
  </div>
  <button class="geo-btn" onclick="getLocation()">
    <span class="geo-dot" id="geoDot"></span>
    <span id="geoLabel">位置を取得</span>
  </button>
</header>



<!-- KEY BAR -->
<div id="kBar" style="background:#1a1a2e;border-radius:14px;margin-bottom:18px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.08);transition:border-color 0.3s;">
  <div onclick="toggleKeyBar()" style="display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;user-select:none;">
    <span id="kDot" style="width:8px;height:8px;border-radius:50%;background:#c0392b;flex-shrink:0;transition:background 0.3s;"></span>
    <span style="font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.12em;text-transform:uppercase;">Gemini API Key</span>
    <span id="kStatus" style="font-size:12px;color:#c0392b;flex:1;">⚠️ 请设置 Key</span>
    <span id="kArrow" style="font-size:11px;color:rgba(255,255,255,0.3);">▼</span>
  </div>
  <div id="kBody" style="display:none;padding:0 14px 14px;gap:8px;flex-direction:column;">
    <div style="font-size:11px;color:rgba(255,255,255,0.4);line-height:1.6;">
      粘贴你的 Gemini API Key，点保存后自动记住，下次打开无需重新输入。<br>
      <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#1a7a6e;text-decoration:none;">→ 免费获取 Key（aistudio.google.com）</a>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <input id="kInput" type="text" placeholder="AIzaSy..."
        style="flex:1;height:38px;border-radius:9px;border:1px solid rgba(255,255,255,0.15);padding:0 12px;font-size:13px;font-family:monospace;background:rgba(255,255,255,0.07);color:#fff;outline:none;transition:border-color 0.2s;"
        onfocus="if(this.value.includes('•')){this.value='';}"
        onkeydown="if(event.key==='Enter')saveKey()"/>
      <button onclick="saveKey()" style="height:38px;padding:0 16px;background:#1a7a6e;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;">保存</button>
      <button onclick="clearKey()" style="height:38px;padding:0 12px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);border:none;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit;">清除</button>
    </div>
  </div>
</div>
<div class="loc-card" id="locCard">
  <div style="font-size:18px">📍</div>
  <div style="flex:1">
    <div class="loc-name" id="locName">—</div>
    <div class="loc-hint" id="locHint">检测到位置，推荐对话场景</div>
  </div>
  <button class="loc-use" id="locUseBtn">用此场景</button>
</div>
<div class="sec-label">自由生成场景</div>
<div class="kw-row">
  <input type="text" id="kwInput" placeholder="输入任意关键词，例如：美容院、引越し、婚活パーティー…"/>
  <button class="gen-btn" id="genBtn" onclick="generateScene()">＋ 生成</button>
</div>
<div class="sec-label" style="margin-top:4px">场景分类</div>
<div class="cat-tabs" id="catTabs"></div>
<div class="scene-grid" id="sceneGrid"></div>
<div class="settings-row">
  <div class="toggle on" onclick="tog('romaji',this)"><span class="dot"></span>罗马音</div>
  <div class="toggle on" onclick="tog('zh',this)"><span class="dot"></span>中文</div>
  <div class="toggle on" onclick="tog('tts',this)"><span class="dot"></span>发音</div>
  <div class="toggle on" onclick="tog('vocab',this)"><span class="dot"></span>单词解析</div>
  <select class="lvl-sel" id="lvlSel">
    <option value="N5">N5 初级</option>
    <option value="N4" selected>N4 入门</option>
    <option value="N3">N3 中级</option>
    <option value="N2">N2 进阶</option>
    <option value="N1">N1 高级</option>
  </select>
</div>
<div class="chat-box">
  <div class="chat-head">
    <div class="chat-head-left">
      <div class="ch-avatar" id="chAvatar">?</div>
      <div>
        <div class="ch-title" id="chTitle">请选择场景开始练习</div>
        <div class="ch-sub" id="chSub">从上方分类中选择一个场景</div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetChat()">↺</button>
  </div>
  <div class="msgs" id="msgs">
    <div class="empty">
      <div class="em">会</div>
      <p>选择上方场景卡片，或输入关键词生成场景<br>也可点击右上角位置按钮自动匹配当前场所</p>
    </div>
  </div>
  <div class="qr-area" id="qrArea"></div>
  <div class="input-area">
    <textarea id="userInput" placeholder="日本語・中文・英語 都可以…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">↑</button>
  </div>
</div>
<div class="vocab-panel" id="vocabPanel">
  <div class="vocab-head"><span>重点词汇 · 語彙</span><span id="vocabCount"></span></div>
  <div class="vocab-list" id="vocabList"></div>
</div>
</div>



<script>
// ── API KEY ──
let GEMINI_KEY = localStorage.getItem('gk') || '';

function geminiURL() {
  return 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY;
}

function updateKeyStatus() {
  const s = document.getElementById('kStatus');
  const dot = document.getElementById('kDot');
  if (!s) return;
  if (GEMINI_KEY) {
    s.textContent = '✅ 已连接'; s.style.color = '#1a7a6e';
    dot.style.background = '#1a7a6e';
  } else {
    s.textContent = '⚠️ 请设置 Key'; s.style.color = '#c0392b';
    dot.style.background = '#c0392b';
  }
}

function saveKey() {
  const inp = document.getElementById('kInput');
  const val = inp.value.trim();
  if (val.startsWith('AIza') && val.length > 20) {
    GEMINI_KEY = val;
    localStorage.setItem('gk', val);
    inp.value = val.slice(0,8) + '••••••••••••••••••••••••••••';
    updateKeyStatus();
    document.getElementById('kBar').style.borderColor = '#1a7a6e';
  } else {
    inp.style.borderColor = '#c0392b';
    setTimeout(() => inp.style.borderColor = '', 2000);
    alert('格式错误，Key 应以 AIzaSy 开头');
  }
}

function clearKey() {
  GEMINI_KEY = '';
  localStorage.removeItem('gk');
  document.getElementById('kInput').value = '';
  updateKeyStatus();
  document.getElementById('kBar').style.borderColor = '';
}

function toggleKeyBar() {
  const body = document.getElementById('kBody');
  const arrow = document.getElementById('kArrow');
  const expanded = body.style.display !== 'none';
  body.style.display = expanded ? 'none' : 'flex';
  arrow.textContent = expanded ? '▼' : '▲';
}

// ── SCENE DATA ──
const CATS = [
  { id:'daily', label:'日常生活', icon:'🏡', scenes:[
    {id:'conbini',  icon:'🏪', name:'コンビニ',     sub:'会計・レジ対応',      av:'CVS', role:'コンビニ店員', ctx:'レジでの会計、温め、宅配便受取、ATM案内など'},
    {id:'supermart',icon:'🛒', name:'スーパー',     sub:'買い物・値段確認',    av:'店',  role:'スーパーの店員', ctx:'商品の場所案内、値段確認、特売品説明、袋の有無'},
    {id:'restaurant',icon:'🍜',name:'レストラン',   sub:'注文・おすすめ',      av:'飯',  role:'レストランの店員', ctx:'席案内、注文受付、おすすめ料理の説明、追加注文、お会計'},

  {label:'电气设计软件', cls:'bs', ids:['ti_eplan','ti_autocad','ti_spice','ti_scada','ti_bim']},
];
const TI_LABEL = {bg:'通用',be:'電気',bn:'エネルギー',bs:'ソフト'};

const ALL = {};
CATS.forEach(c => c.scenes.forEach(s => { ALL[s.id] = s; }));

const S = { cat:'daily', scene:null, msgs:[], loading:false, settings:{romaji:true,zh:true,tts:true,vocab:true} };

function renderCats() {
  document.getElementById('catTabs').innerHTML = CATS.map(c =>
    `<button class="cat-tab ${c.id==='techinterview'?'ti-tab':''} ${S.cat===c.id?'active':''}" onclick="selCat('${c.id}')">${c.icon} ${c.label}</button>`
  ).join('');
}
function selCat(id) { S.cat=id; renderCats(); renderScenes(); }

function renderScenes() {
  const grid = document.getElementById('sceneGrid');
  if (S.cat === 'techinterview') {
    let html = '';
    TI_GROUPS.forEach(g => {
      html += `<div class="ti-sec">${g.label}</div>`;
      g.ids.forEach(id => {
        const sc = ALL[id]; if(!sc) return;
        html += `<div class="scene-card ${g.cls} ${S.scene?.id===id?'active':''}" onclick="selScene('${id}')">
          <div class="sc-icon">${sc.icon}</div>
          <span class="ti-badge ${g.cls}">${TI_LABEL[g.cls]}</span>
          <div class="sc-name">${sc.name}</div>
          <div class="sc-sub">${sc.sub}</div>
        </div>`;
      });
    });
    grid.innerHTML = html;
  } else {
    const cat = CATS.find(c => c.id===S.cat);
    grid.innerHTML = cat.scenes.map(sc =>
      `<div class="scene-card ${S.scene?.id===sc.id?'active':''}" onclick="selScene('${sc.id}')">
        <div class="sc-icon">${sc.icon}</div>
        <div class="sc-name">${sc.name}</div>
        <div class="sc-sub">${sc.sub}</div>
      </div>`
    ).join('');
  }
}

function selScene(id) {
  const sc = ALL[id]; if(!sc) return;
  S.scene=sc; S.msgs=[];
  renderScenes();
  document.getElementById('chAvatar').textContent = sc.av;
  document.getElementById('chTitle').textContent = sc.name + ' — ' + sc.sub;
  document.getElementById('chSub').textContent = sc.role + 'があなたと会話します';
  clearChat();
  setTimeout(startConv, 250);
}

function clearChat() {
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('qrArea').innerHTML = '';
  document.getElementById('vocabPanel').classList.remove('show');
}
function resetChat() { if(!S.scene) return; S.msgs=[]; clearChat(); setTimeout(startConv,200); }

function sysP() {
  const sc=S.scene, lv=document.getElementById('lvlSel').value;
  return `あなたは日本語会話練習AIです。シーン：${sc.name}（${sc.sub}）。役割：${sc.role}。背景：${sc.ctx}。レベル：${lv}。
毎回の返答は必ず以下のJSON形式のみで出力（他のテキスト一切不可）：
{"jp":"日本語返答","zh":"中文翻译","romaji":"ローマ字（Hepburn）","words":[{"jp":"単語","reading":"読み","zh":"意味"}],"suggestions":["回答1","回答2","回答3"]}
wordsは重要語彙を最大4つ。suggestionsはユーザーの次の自然な${lv}レベルの返答候補3つ（日本語）。`;
}

async function callAI(msgs) {
  const r = await fetch(geminiURL(), {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ system_instruction:{parts:[{text:sysP()}]}, contents:msgs })
  });
  const d = await r.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
}

async function startConv() {
  if(!S.scene || !GEMINI_KEY) return;
  S.loading=true; showTyping();
  try {
    const txt = await callAI([{role:'user',parts:[{text:'会話を始めてください。役になりきって最初の声かけをしてください。'}]}]);
    removeTyping(); S.loading=false;
    const d = parse(txt);
    addAI(d);
    S.msgs.push({role:'model',parts:[{text:txt}]});
  } catch(e) { removeTyping(); S.loading=false; addAI({jp:'エラーが発生しました。もう一度お試しください。',zh:'发生错误，请重试。',romaji:'',words:[],suggestions:[]}); }
}

async function sendMsg() {
  if(S.loading||!S.scene||!GEMINI_KEY) return;
  const ta=document.getElementById('userInput');
  const text=ta.value.trim(); if(!text) return;
  ta.value=''; ta.style.height='40px';
  document.getElementById('qrArea').innerHTML='';
  addUser(text);
  S.msgs.push({role:'user',parts:[{text}]});
  S.loading=true; document.getElementById('sendBtn').disabled=true; showTyping();
  try {
    const hist = S.msgs.slice(-14);
    if(hist[0]?.role!=='user') hist.unshift({role:'user',parts:[{text:'会話を始めてください。'}]});
    const txt = await callAI(hist);
    removeTyping(); S.loading=false; document.getElementById('sendBtn').disabled=false;
    const d = parse(txt);
    addAI(d);
    S.msgs.push({role:'model',parts:[{text:txt}]});
  } catch(e) { removeTyping(); S.loading=false; document.getElementById('sendBtn').disabled=false; addAI({jp:'エラー。もう一度お試しください。',zh:'网络错误，请重试。',romaji:'',words:[],suggestions:[]}); }
}

function parse(txt) {
  try { return JSON.parse(txt.replace(/```json|```/g,'').trim()); }
  catch(e) { return {jp:txt,zh:'',romaji:'',words:[],suggestions:[]}; }
}

function addAI(d) {
  const area=document.getElementById('msgs'), av=S.scene?.av||'AI';
  const row=document.createElement('div'); row.className='msg-row ai';
  const rm=S.settings.romaji&&d.romaji?`<div class="rm-line">${esc(d.romaji)}</div>`:'';
  const zh=S.settings.zh&&d.zh?`<div class="zh-line">${esc(d.zh)}</div>`:'';
  const tts=S.settings.tts?`<button class="tts-btn" onclick="speak('${escA(d.jp)}',this)">▶ 発音</button>`:'';
  row.innerHTML=`<div class="msg-av">${av}</div><div class="msg-body"><div class="bubble">${rm}<div class="jp-line">${esc(d.jp)}</div>${zh}</div>${tts}</div>`;
  area.appendChild(row); area.scrollTop=area.scrollHeight;
  if(d.suggestions?.length) renderQR(d.suggestions);
  if(S.settings.vocab&&d.words?.length) renderVocab(d.words);
  if(S.settings.tts) setTimeout(()=>speak(d.jp,null),400);
}
function addUser(text) {
  const area=document.getElementById('msgs'), row=document.createElement('div');
  row.className='msg-row user';
  row.innerHTML=`<div class="msg-av">你</div><div class="msg-body"><div class="bubble"><div class="jp-line">${esc(text)}</div></div></div>`;
  area.appendChild(row); area.scrollTop=area.scrollHeight;
}
function renderQR(s) { document.getElementById('qrArea').innerHTML=s.map(x=>`<button class="qr" onclick="useQR('${escA(x)}')">${esc(x)}</button>`).join(''); }
function useQR(t) { document.getElementById('userInput').value=t; sendMsg(); }
function renderVocab(words) {
  document.getElementById('vocabCount').textContent=words.length+' 語';
  document.getElementById('vocabList').innerHTML=words.map(w=>`<div class="vocab-item"><span class="v-jp">${esc(w.jp)}</span><span class="v-rm">${esc(w.reading||'')}</span><span class="v-zh">${esc(w.zh)}</span><button class="v-tts" onclick="speak('${escA(w.jp)}',this)">▶</button></div>`).join('');
  document.getElementById('vocabPanel').classList.add('show');
}
function showTyping() {
  const area=document.getElementById('msgs'), d=document.createElement('div');
  d.className='msg-row ai'; d.id='typingRow';
  d.innerHTML=`<div class="msg-av">${S.scene?.av||'AI'}</div><div class="msg-body"><div class="bubble"><div class="typing"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div></div></div>`;
  area.appendChild(d); area.scrollTop=area.scrollHeight;
}
function removeTyping() { document.getElementById('typingRow')?.remove(); }
function speak(text,btn) {
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='ja-JP'; u.rate=0.88;
  const v=window.speechSynthesis.getVoices().find(x=>x.lang==='ja-JP'||x.lang==='ja');
  if(v) u.voice=v;
  if(btn){btn.classList.add('playing'); u.onend=()=>btn.classList.remove('playing');}
  window.speechSynthesis.speak(u);
}
function tog(key,el) { S.settings[key]=!S.settings[key]; el.classList.toggle('on',S.settings[key]); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escA(s) { return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function autoResize(el) { el.style.height='40px'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

async function generateScene() {
  const kw=document.getElementById('kwInput').value.trim(); if(!kw||!GEMINI_KEY) return;
  const btn=document.getElementById('genBtn'); btn.disabled=true; btn.textContent='生成中…';
  try {
    const prompt=`根据关键词生成一个日语对话练习场景的JSON，只输出纯JSON不要任何其他内容：{"id":"custom","icon":"单个emoji","name":"场景名（日语2-5字）","sub":"副标题（日语4-8字）","av":"2字缩写","role":"AI角色（日语）","ctx":"详细背景（日语）"} 关键词：${kw}`;
    const r=await fetch(geminiURL(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    const data=await r.json();
    const txt=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const sc=JSON.parse(txt.replace(/```json|```/g,'').trim());
    sc.id='custom_'+Date.now(); ALL[sc.id]=sc;
    let cc=CATS.find(c=>c.id==='_custom');
    if(!cc){cc={id:'_custom',label:'自定义',icon:'✨',scenes:[]};CATS.unshift(cc);}
    cc.scenes.unshift(sc); S.cat='_custom';
    renderCats(); renderScenes(); selScene(sc.id);
    document.getElementById('kwInput').value='';
  } catch(e){alert('生成失败，请重试');}
  btn.disabled=false; btn.innerHTML='＋ 生成';
}

function getLocation() {
  if(!navigator.geolocation){return;}
  const dot=document.getElementById('geoDot'),label=document.getElementById('geoLabel');
  label.textContent='取得中…';
  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    dot.classList.add('on'); label.textContent=`${lat.toFixed(3)},${lng.toFixed(3)}`;
    if(!GEMINI_KEY) return;
    try {
      const prompt=`根据GPS坐标判断用户可能在什么类型的日本场所，只输出纯JSON：{"placeName":"推测场所名（日语）","sceneId":"从以下选一个：conbini/supermart/restaurant/izakaya/cafe/pharmacy/bank/post/hospital/station/taxi/airport/realestate/delivery/interview/office/hotel/shopping/lost/sick/other","hint":"简短说明（中文15字以内）"} 坐标：纬度${lat.toFixed(4)}, 经度${lng.toFixed(4)}，日本`;
      const r=await fetch(geminiURL(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const data=await r.json();
      const txt=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
      const json=JSON.parse(txt.replace(/```json|```/g,'').trim());
      document.getElementById('locName').textContent=json.placeName;
      document.getElementById('locHint').textContent=json.hint;
      document.getElementById('locCard').classList.add('show');
      document.getElementById('locUseBtn').onclick=()=>{
        if(json.sceneId!=='other'&&ALL[json.sceneId]) selScene(json.sceneId);
        else {document.getElementById('kwInput').value=json.placeName; generateScene();}
        document.getElementById('locCard').classList.remove('show');
      };
    } catch(e){}
  },()=>{label.textContent='取得失敗';});
}

// ── INIT ──
if('speechSynthesis' in window) window.speechSynthesis.getVoices();
renderCats();
renderScenes();
window.addEventListener('load', () => {
  updateKeyStatus();
  if (GEMINI_KEY) {
    const inp = document.getElementById('kInput');
    if(inp) inp.value = GEMINI_KEY.slice(0,8) + '••••••••••••••••••••••••••••';
    document.getElementById('kBar').style.borderColor = '#1a7a6e';
  } else {
    // Auto expand if no key
    document.getElementById('kBody').style.display = 'flex';
    document.getElementById('kArrow').textContent = '▲';
  }
});


</script>
